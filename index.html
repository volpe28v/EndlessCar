<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エンドレスカー</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica', sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 170px;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            max-width: calc(100% - 190px); /* ボタン幅を考慮して調整 */
            z-index: 10;
        }
        #viewButtons {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
            flex-wrap: nowrap;
            justify-content: flex-start;
            max-width: 60px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .button-separator {
            width: 100%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.3);
            margin: 5px 0;
        }
        
        .weather-button {
            font-size: 16px !important;
            padding: 2px 6px !important;
        }
        
        .weather-button.active {
            background-color: rgba(100, 100, 255, 0.7);
        }
        
        /* ミニマップ用のスタイル */
        #minimap-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 130px;
            height: 120px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            z-index: 99;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        #minimap {
            height: 100px;
        }
        
        #speed-display {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            color: white;
            font-size: 12px;
            text-align: center;
            line-height: 20px;
            font-family: 'Helvetica', sans-serif;
            background-color: rgba(0, 0, 0, 0.3);
        }
        
        #minimap-label {
            position: absolute;
            top: 5px;
            left: 5px;
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
        }
        
        .viewButton {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid white;
            border-radius: 3px;
            padding: 4px 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-bottom: 3px;
            min-width: 30px;
            text-align: center; /* テキストを中央揃え */
            width: 100%; /* ボタンの幅を親要素に合わせる */
        }
        .viewButton:hover {
            background-color: rgba(50, 50, 50, 0.7);
        }
        .viewButton:active {
            transform: scale(0.95);
        }
        .viewButton.active {
            background-color: rgba(100, 100, 255, 0.7);
        }
        /* スマートフォン向け調整 */
        @media (max-width: 480px) {
            #info {
                left: 120px;
                font-size: 12px;
            }
            .viewButton {
                padding: 3px 4px;
                font-size: 10px;
                min-width: 24px;
            }
            #viewButtons {
                gap: 2px;
                max-width: 45px; /* スマホ向けにさらに小さく */
            }
            
            #minimap-container {
                width: 104px;
                height:100px;
                right: 55px;
            }
            #minimap {
                height: 80px;
            }
            
            /* スマホ向け時間モードボタン位置調整 */
            #timeToggle {
                right: 55px;
                top: 160px; /* 視点ボタンの下に配置 */
            }
            
            /* スマホ向け天気ボタン位置調整を削除 */
            #weatherToggle {
                right: 55px;
                top: 210px; /* 時間モードボタンの下に配置 */
            }
        }
        
        #timeWeatherInfo {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        #timeToggleButton {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            margin: 0 5px;
        }
        
        #timeToggleButton:hover {
            opacity: 0.8;
        }
        
        /* 天気ボタン用のスタイル追加 */
        .weather-button {
            font-size: 16px !important;
            padding: 2px 6px !important;
        }
        
        /* セパレーター用のスタイル */
        .button-separator {
            width: 100%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.3);
            margin: 5px 0;
        }
        /* BGMコントロール用のスタイル */
        #bgmControl {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 100;
        }
        
        #bgmControl button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #bgmControl button:hover {
            opacity: 0.8;
        }
        
        #bgmVolume {
            width: 80px;
            margin: 0 5px;
        }

        /* レースモード */
        #race-ui {
            position: absolute;
            top: 140px;
            left: 10px;
            z-index: 10;
        }
        #race-position-board {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 6px;
            border-radius: 5px;
            font-size: 11px;
            font-family: 'Helvetica', monospace;
            width: 130px;
            box-sizing: border-box;
        }
        #race-bottom-bar {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 3px;
            width: 130px;
        }
        #race-position-board table {
            width: 100%;
            border-collapse: collapse;
        }
        #race-position-board th, #race-position-board td {
            padding: 1px 3px;
            text-align: left;
            white-space: nowrap;
        }
        #race-position-board th {
            border-bottom: 1px solid rgba(255,255,255,0.3);
            font-size: 9px;
            color: #aaa;
        }
        #race-position-board tr.current-car {
            background-color: rgba(100, 100, 255, 0.3);
        }
        #race-countdown {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 120px;
            font-weight: bold;
            font-family: 'Helvetica', sans-serif;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }
        #race-results {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica', sans-serif;
        }
        #race-results h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        #race-results table {
            border-collapse: collapse;
            font-size: 16px;
            min-width: 400px;
        }
        #race-results th, #race-results td {
            padding: 6px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        #race-results th {
            color: #aaa;
            font-size: 13px;
        }
        #race-results .result-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        #race-results .result-buttons button {
            background-color: rgba(100, 100, 255, 0.7);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            padding: 10px 24px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #race-results .result-buttons button:hover {
            background-color: rgba(130, 130, 255, 0.9);
        }
        #race-predict {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Helvetica', sans-serif;
        }
        #race-predict-text {
            font-size: 16px;
            margin-bottom: 8px;
        }
        #race-predict-confirm {
            background-color: rgba(100, 100, 255, 0.7);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        #race-predict-confirm:hover {
            background-color: rgba(130, 130, 255, 0.9);
        }
        tr.predicted-car td {
            color: #ffdd00;
        }
        .race-auto-btn {
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            padding: 3px 6px;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            width: 100%;
        }
        .race-auto-btn.active {
            background-color: rgba(100, 100, 255, 0.7);
        }
        .race-auto-btn:hover {
            background-color: rgba(50, 50, 50, 0.7);
        }
        #race-position-board {
            pointer-events: auto;
        }
        #race-position-board tr:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        @media (max-width: 480px) {
            #race-ui {
                top: 110px;
                left: 10px;
            }
            #race-position-board {
                font-size: 10px;
                width: 104px;
            }
            #race-bottom-bar {
                width: 104px;
            }
            #race-countdown {
                font-size: 80px;
            }
            #race-results table {
                font-size: 13px;
                min-width: auto;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/OBJLoader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/FBXLoader.js"></script>

</head>
<body>
    <div id="viewButtons">
        <div class="button-group view-buttons">
            <button class="viewButton" data-view="0" title="俯瞰視点 (1)">俯瞰</button>
            <button class="viewButton" data-view="1" title="追従視点 (2)">追従</button>
            <button class="viewButton" data-view="2" title="車載視点 (3)">車載</button>
            <button class="viewButton active" data-view="3" title="斜め上視点 (4)">斜め</button>
            <button class="viewButton" data-view="4" title="前方視点 (5)">前方</button>
        </div>
        <div class="button-separator"></div>
        <div class="button-group weather-buttons">
            <button class="viewButton weather-button" data-weather="sunny" title="晴れ">☀️</button>
            <button class="viewButton weather-button" data-weather="cloudy" title="曇り">☁️</button>
            <button class="viewButton weather-button" data-weather="rain" title="雨">🌧️</button>
            <button class="viewButton weather-button" data-weather="snow" title="雪">❄️</button>
        </div>
        <div class="button-separator"></div>
        <div class="button-group">
            <button class="viewButton" id="raceButton" title="レースモード">Race</button>
        </div>
    </div>
    <div id="bgmControl">
        <input type="range" id="bgmVolume" min="0" max="100" value="20" title="音量">
        <button id="muteBgm" title="ミュート">🔊</button>
    </div>
    <div id="minimap-container">
        <canvas id="minimap"></canvas>
        <div id="speed-display">0 km/h</div>
    </div>
    <div id="info">
        <div id="timeWeatherInfo" style="font-family: 'Helvetica', sans-serif;">
            <div class="info-row">
                <button id="timeToggleButton" title="現在の時刻に連動（クリックで切替）">🕒</button>
                <span id="currentTime">--:--</span>
                <span id="currentLocation"></span>
            </div>
            <div class="info-row">
                <span id="currentWeatherText">-</span>
            </div>
        </div>
    </div>
    <div id="race-ui" style="display:none;">
        <div id="race-position-board"></div>
        <div id="race-bottom-bar">
            <button id="race-auto-camera" class="race-auto-btn active" title="カメラ自動切替">Auto</button>
        </div>
    </div>
    <div id="race-predict" style="display:none;">
        <div id="race-predict-text">TAB / クリックで優勝予想を選択</div>
        <button id="race-predict-confirm">この車に決定!</button>
    </div>
    <div id="race-countdown" style="display:none;"></div>
    <div id="race-results" style="display:none;"></div>
    <script type="module">
        import { ctx } from './GameContext.js';
        import { Car } from './Car.js';
        import { SPEED_TO_KMH } from './CarConstants.js';
        import { createTrack } from './TrackData.js';
        import { createRoadSurface, createCurbstones, createRoadPillars } from './RoadBuilder.js';
        import { placeEnvironmentObjects } from './EnvironmentBuilder.js';
        import { RenderCache, WeatherSystem, initWeatherSystem, setupWeatherButtons, updateWeatherButtonState } from './WeatherSystem.js';
        import { updateDayNightCycle } from './DayNightCycle.js';
        import { updateCamera, setupViewButtons, updateButtonActiveState } from './CameraSystem.js';
        import { RealtimeState, toggleTimeMode } from './TimeModeStates.js';
        import { RaceManager } from './RaceManager.js';
        import { CarModelLoader } from './CarModelLoader.js';

        function log(message) {
            console.log(`[${new Date().toISOString()}] ${message}`);
        }

        log("スクリプト開始");

        // === 基本設定 ===
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isMobile) {
            renderer.setPixelRatio(0.8);
        }
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x646464);
        document.body.appendChild(renderer.domElement);

        // ctx に基本オブジェクトを登録
        ctx.scene = scene;
        ctx.camera = camera;
        ctx.renderer = renderer;
        ctx.updateButtonActiveState = updateButtonActiveState;

        const HORIZONTAL_SCALE = ctx.HORIZONTAL_SCALE;

        // === トラック生成 ===
        const { carPath, detailedPathPoints } = createTrack();
        ctx.carPath = carPath;
        ctx.detailedPathPoints = detailedPathPoints;

        const roadGroup = new THREE.Group();
        scene.add(roadGroup);
        ctx.roadGroup = roadGroup;

        // === 車の管理 ===
        function createCars(count = 1) {
            for (let car of ctx.cars) {
                car.dispose(scene);
            }
            ctx.cars.length = 0;
            for (let i = 0; i < count; i++) {
                const car = new Car(carPath);
                car.position = i * (1.0 / count);
                car._index = i;
                car.createObject(scene);
                ctx.cars.push(car);
            }
            for (let i = 0; i < count; i++) {
                const car = ctx.cars[i];
                car.setOtherCars(ctx.cars.filter(c => c !== car));
            }
            log(`${count}台の車を作成しました`);
        }
        ctx.createCars = createCars;

        // === レースマネージャー ===
        const raceManager = new RaceManager();
        ctx.raceManager = raceManager;

        // === 光源 ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        ctx.ambientLight = ambientLight;

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);
        ctx.directionalLight = directionalLight;

        // === 地面 ===
        const floorSize = 5000;
        const floorGeometry = new THREE.PlaneGeometry(floorSize, floorSize);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x336633,
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -5;
        scene.add(floor);
        ctx.floor = floor;

        // === レンダリングキャッシュ・天気システム ===
        const renderCache = new RenderCache();
        ctx.renderCache = renderCache;

        const weatherSystem = new WeatherSystem(scene);
        ctx.weatherSystem = weatherSystem;

        // === 時間モード ===
        ctx.timeModeState = new RealtimeState();
        ctx.lastCameraChangeTime = Date.now();
        ctx.lastCarChangeTime = Date.now();
        ctx.currentFrameTime = Date.now();

        // === 道路の可視化 ===
        createRoadSurface();
        createRoadPillars();
        createCurbstones();
        log("道路の作成完了");

        // === OBJモデルのプリロード & 車の初期作成 ===
        (async () => {
            try {
                await CarModelLoader.preload();
                log("OBJモデルのプリロード完了");
            } catch(e) {
                console.warn("OBJモデルロード失敗、プロシージャルにフォールバック:", e);
            }
            createCars(16);
            log("車の作成完了");
        })();

        // === カメラ初期位置 ===
        camera.position.set(100, 70, 90);
        log("Three.jsの基本設定完了");

        // === デバッグラベル描画 ===
        function drawDebugInfo(canvasCtx, car, textY, barY) {
            const strategyLabels = { OUT_IN_OUT: 'OIO', LATE_APEX: 'LA', IN_IN_IN: 'III', WIDE_ENTRY: 'WE' };
            const strategyColors = { OUT_IN_OUT: '#44aaff', LATE_APEX: '#ffaa00', IN_IN_IN: '#ff4488', WIDE_ENTRY: '#aa44ff' };

            let stateChar = 'N';
            let stateColor = '#888888';
            if (car.isOvertaking && !car.isReturning) { stateChar = 'P'; stateColor = '#ff8800'; }
            else if (car.isReturning) { stateChar = 'R'; stateColor = '#88aaff'; }
            else if (car.isTandemFollowing) { stateChar = 'T'; stateColor = '#00ff88'; }

            const strat = car.drivingStyle?.lineStrategy || '';
            const kmh = Math.round(car.speed * SPEED_TO_KMH);
            const infoText = stateChar + ' ' + (strategyLabels[strat] || '') + ' ' + kmh;

            canvasCtx.font = 'bold 18px sans-serif';
            const totalW = canvasCtx.measureText(infoText).width;
            let cx = 128 - totalW / 2;
            canvasCtx.textAlign = 'left';
            canvasCtx.fillStyle = stateColor;
            canvasCtx.fillText(stateChar, cx, textY);
            cx += canvasCtx.measureText(stateChar + ' ').width;
            canvasCtx.fillStyle = strategyColors[strat] || '#888888';
            const stratLabel = strategyLabels[strat] || '';
            canvasCtx.fillText(stratLabel, cx, textY);
            cx += canvasCtx.measureText(stratLabel + ' ').width;
            canvasCtx.fillStyle = '#cccccc';
            canvasCtx.fillText('' + kmh, cx, textY);
            canvasCtx.textAlign = 'center';

            const slip = car.slipstreamCharge;
            if (slip > 0) {
                const barX = 60, barW = 136, barH = 8;
                canvasCtx.fillStyle = 'rgba(255,255,255,0.2)';
                canvasCtx.fillRect(barX, barY, barW, barH);
                const r = Math.floor(255 * slip);
                const g = Math.floor(255 * (1 - slip * 0.5));
                canvasCtx.fillStyle = `rgb(${r},${g},0)`;
                canvasCtx.fillRect(barX, barY, barW * slip, barH);
                canvasCtx.strokeStyle = 'rgba(255,255,255,0.5)';
                canvasCtx.lineWidth = 1;
                canvasCtx.strokeRect(barX, barY, barW, barH);
            }
        }

        // === ミニマップ ===
        function _buildMinimapCache() {
            const canvas = document.getElementById('minimap');
            const margin = 10;
            const pathPoints = [];
            for (let i = 0; i <= 100; i++) {
                pathPoints.push(carPath.getPointAt(i / 100));
            }
            let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
            for (const p of pathPoints) {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
            }
            const width = canvas.width - margin * 2;
            const height = canvas.height - margin * 2;
            const scale = Math.min(width / (maxX - minX), height / (maxZ - minZ));
            const path2d = new Path2D();
            for (let i = 0; i < pathPoints.length; i++) {
                const x = margin + (pathPoints[i].x - minX) * scale;
                const z = margin + (pathPoints[i].z - minZ) * scale;
                if (i === 0) path2d.moveTo(x, z); else path2d.lineTo(x, z);
            }
            path2d.closePath();
            renderCache.minimap = { margin, minX, minZ, scale, path2d };
        }

        function updateMinimap() {
            const canvas = document.getElementById('minimap');
            const mmCtx = canvas.getContext('2d');
            if (!renderCache.minimap) _buildMinimapCache();
            const { margin, minX, minZ, scale, path2d } = renderCache.minimap;

            mmCtx.clearRect(0, 0, canvas.width, canvas.height);
            mmCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            mmCtx.fillRect(0, 0, canvas.width, canvas.height);
            mmCtx.strokeStyle = 'white';
            mmCtx.lineWidth = 1;
            mmCtx.stroke(path2d);

            for (let i = 0; i < ctx.cars.length; i++) {
                const car = ctx.cars[i];
                const pos = car.object.position;
                const x = margin + (pos.x - minX) * scale;
                const y = margin + (pos.z - minZ) * scale;
                const dir = car._frameFwd;
                const angle = Math.atan2(dir.z, dir.x) + Math.PI/2;

                mmCtx.save();
                mmCtx.translate(x, y);
                mmCtx.rotate(angle);
                mmCtx.beginPath();
                mmCtx.moveTo(0, -5);
                mmCtx.lineTo(-3, 3);
                mmCtx.lineTo(3, 3);
                mmCtx.closePath();
                let carColor = 'white';
                if (i === ctx.currentCarIndex) carColor = 'red';
                else if (car.isTandemFollowing) carColor = '#00ffff';
                else if (car.isOvertaking) carColor = '#ff8800';
                mmCtx.fillStyle = carColor;
                mmCtx.fill();
                mmCtx.restore();
            }
        }

        // === アニメーションループ ===
        let frameCount = 0;
        let lastFrameTime = Date.now();

        function animate() {
            requestAnimationFrame(animate);

            const metrics = {};
            const startTime = performance.now();
            let lastCheck = startTime;

            ctx.currentFrameTime = Date.now();
            const deltaTime = (ctx.currentFrameTime - lastFrameTime) / 16.67;
            lastFrameTime = ctx.currentFrameTime;

            updateDayNightCycle();
            metrics.dayNightCycle = performance.now() - lastCheck;
            lastCheck = performance.now();

            weatherSystem.update(deltaTime, camera);
            metrics.weather = performance.now() - lastCheck;
            lastCheck = performance.now();

            // オート・早送りモード時の車の自動切り替え
            if (ctx.timeModeState.shouldAutoSwitch() && !raceManager?.active && ctx.currentFrameTime - ctx.lastCarChangeTime > ctx.carChangeInterval) {
                const availableCars = Array.from({length: ctx.cars.length}, (_, i) => i).filter(i => i !== ctx.currentCarIndex);
                ctx.currentCarIndex = availableCars[Math.floor(Math.random() * availableCars.length)];
                ctx.lastCarChangeTime = ctx.currentFrameTime;
                ctx.carChangeInterval = 20000 + Math.random() * 10000;
            }

            // 車の更新
            for (let i = 0; i < ctx.cars.length; i++) {
                const car = ctx.cars[i];
                car.update(deltaTime);

                if (ctx.debugMode || raceManager?.active) {
                    if (!car._debugLabel) {
                        const canvas = document.createElement('canvas');
                        canvas.width = 256;
                        canvas.height = 96;
                        const texture = new THREE.CanvasTexture(canvas);
                        const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
                        const sprite = new THREE.Sprite(material);
                        sprite.scale.set(10, 3.75, 1);
                        scene.add(sprite);
                        car._debugLabel = sprite;
                        car._debugCanvas = canvas;
                        car._debugTexture = texture;
                    }
                    car._debugLabel.visible = true;

                    let debugKey = '';
                    if (raceManager?.active) {
                        const ranked = raceManager._cachedRanked || raceManager.getRankedCars();
                        const rank = ranked.findIndex(([c]) => c === car) + 1 || car.raceRank || 0;
                        const isPredicted = raceManager.predictedCar === car;
                        const isFocused = !raceManager.predictedCar && car._index === ctx.currentCarIndex;
                        const stateChar = car.isOvertaking && !car.isReturning ? 'P' : car.isReturning ? 'R' : car.isTandemFollowing ? 'T' : 'N';
                        const kmh = Math.round(car.speed * SPEED_TO_KMH / 5) * 5;
                        const slip = Math.round(car.slipstreamCharge * 5);
                        debugKey = `R${rank}${ctx.debugMode?1:0}${stateChar}${kmh}${slip}${isPredicted?1:0}${isFocused?1:0}`;
                    } else if (ctx.debugMode) {
                        const stateChar = car.isOvertaking && !car.isReturning ? 'P' : car.isReturning ? 'R' : car.isTandemFollowing ? 'T' : 'N';
                        const kmh = Math.round(car.speed * SPEED_TO_KMH / 5) * 5;
                        const slip = Math.round(car.slipstreamCharge * 5);
                        debugKey = `D${stateChar}${kmh}${slip}`;
                    }

                    if (debugKey !== car._lastDebugKey) {
                        car._lastDebugKey = debugKey;
                        const dCtx = car._debugCanvas.getContext('2d');
                        dCtx.clearRect(0, 0, 256, 96);

                        if (raceManager?.active) {
                            const ranked = raceManager._cachedRanked || raceManager.getRankedCars();
                            const rank = ranked.findIndex(([c]) => c === car) + 1 || car.raceRank || 0;
                            const isPredicted = raceManager.predictedCar === car;
                            const isFocused = !raceManager.predictedCar && car._index === ctx.currentCarIndex;
                            dCtx.font = 'bold 44px sans-serif';
                            dCtx.textAlign = 'center';
                            dCtx.fillStyle = rank <= 3 ? '#ffdd00' : '#ffffff';
                            dCtx.fillText('P' + rank, 128, ctx.debugMode ? 36 : 48);
                            if (ctx.debugMode) {
                                drawDebugInfo(dCtx, car, 56, 62);
                            }
                            if (isPredicted || isFocused) {
                                dCtx.font = 'bold 18px sans-serif';
                                dCtx.fillStyle = isFocused ? '#ff8800' : '#ffdd00';
                                dCtx.fillText('\u2605', 128, ctx.debugMode ? 82 : 70);
                            }
                        } else if (ctx.debugMode) {
                            drawDebugInfo(dCtx, car, 36, 42);
                        }
                        car._debugTexture.needsUpdate = true;
                    }
                    car._debugLabel.position.copy(car.object.position);
                    car._debugLabel.position.y += 5;
                }
            }

            // レース更新
            if (raceManager?.active && raceManager.phase === 'racing') {
                raceManager.updateRace();
            }
            if (raceManager?.active && frameCount % 10 === 0) {
                raceManager.updateUI();
            }

            metrics.carUpdates = performance.now() - lastCheck;
            lastCheck = performance.now();

            // 速度表示の更新
            const currentCar = ctx.cars[ctx.currentCarIndex];
            if (currentCar) {
                const speedKmh = Math.round(currentCar.speed * HORIZONTAL_SCALE * 3.6);
                document.getElementById('speed-display').textContent = `${speedKmh} km/h`;
            }

            updateCamera();
            metrics.camera = performance.now() - lastCheck;
            lastCheck = performance.now();

            if (frameCount % 3 === 0) updateMinimap();
            metrics.minimap = performance.now() - lastCheck;
            lastCheck = performance.now();

            renderer.render(scene, camera);
            metrics.rendering = performance.now() - lastCheck;
            metrics.total = performance.now() - startTime;

            frameCount++;
            if (frameCount % 100 === 0) {
                console.log('Frame Performance Metrics:');
                console.table(metrics);
            }
        }

        // === リサイズ処理 ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === キーボード操作 ===
        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'Tab':
                    event.preventDefault();
                    ctx.currentCarIndex = (ctx.currentCarIndex + 1) % ctx.cars.length;
                    break;
                case '1': ctx.cameraMode = 0; updateButtonActiveState(); break;
                case '2': ctx.cameraMode = 1; updateButtonActiveState(); break;
                case '3': ctx.cameraMode = 2; updateButtonActiveState(); break;
                case '4': ctx.cameraMode = 3; updateButtonActiveState(); break;
                case '5': ctx.cameraMode = 4; updateButtonActiveState(); break;
                case 'd':
                case 'D':
                    ctx.debugMode = !ctx.debugMode;
                    if (!ctx.debugMode) {
                        for (const car of ctx.cars) {
                            if (car._debugLabel) car._debugLabel.visible = false;
                        }
                    }
                    break;
            }
        });

        // === 時間モード切替ボタン ===
        document.getElementById('timeToggleButton').addEventListener('click', function() {
            toggleTimeMode();
        });

        // === 順位表クリック ===
        document.getElementById('race-position-board').addEventListener('mousedown', (e) => {
            e.stopPropagation();
            const row = e.target.closest('tr[data-car-index]');
            if (row && raceManager?.active) {
                const idx = parseInt(row.getAttribute('data-car-index'));
                if (!isNaN(idx)) {
                    ctx.currentCarIndex = idx;
                    raceManager.autoCameraMode = false;
                    raceManager.stopAutoCamera();
                    raceManager.updateAutoCameraButton();
                }
            }
        });

        // === BGM初期化 ===
        async function initBgm() {
            let isBgmMuted = true;
            let bgmVolume = 0.2;
            const bgms = ['RRR-01.mid', 'RR-01.mid', 'RR4-01.mid', 'RR4-02.mid'];
            const picoAudio = new PicoAudio();
            picoAudio.init();
            picoAudio.setMasterVolume(0.2);

            async function playRandomBgm() {
                const randomIndex = Math.floor(Math.random() * bgms.length);
                const midiName = `midi/${bgms[randomIndex]}`;
                console.log('fetching', midiName);
                fetch(midiName)
                .then(response => response.arrayBuffer())
                .then(data => {
                    console.log('fetched', midiName);
                    const smfData = picoAudio.parseSMF(data);
                    console.log('parsed', smfData);
                    picoAudio.setData(smfData);
                    picoAudio.play();
                });
            }

            try {
                document.getElementById('muteBgm').textContent = '🔇';
                document.getElementById('bgmVolume').addEventListener('input', function() {
                    bgmVolume = this.value / 100;
                    if (!isBgmMuted) {
                        picoAudio.setMasterVolume(bgmVolume);
                    }
                });
                document.getElementById('muteBgm').addEventListener('click', function() {
                    isBgmMuted = !isBgmMuted;
                    if (isBgmMuted) {
                        picoAudio.setMasterVolume(0);
                        this.textContent = '🔇';
                        picoAudio.stop();
                    } else {
                        picoAudio.setMasterVolume(bgmVolume);
                        this.textContent = '🔊';
                        playRandomBgm();
                    }
                });
                picoAudio.addEventListener('songEnd', () => {
                    playRandomBgm();
                });
            } catch (error) {
                console.error('BGMの初期化エラー:', error);
            }
        }

        // === 初期化関数 ===
        function init() {
            placeEnvironmentObjects();
            setupViewButtons();
            setupWeatherButtons();
            updateWeatherButtonState(weatherSystem.current);

            document.getElementById('minimap-container').addEventListener('click', () => {
                ctx.currentCarIndex = (ctx.currentCarIndex + 1) % ctx.cars.length;
            });

            initBgm();
            log("アニメーション開始");
            animate();
            initWeatherSystem();

            document.getElementById('raceButton').addEventListener('click', () => {
                if (raceManager.active) {
                    raceManager.endRaceMode();
                } else {
                    raceManager.startRace();
                }
            });

            document.getElementById('race-predict-confirm').addEventListener('click', () => {
                if (raceManager.active && raceManager.phase === 'grid') {
                    raceManager.confirmPrediction();
                }
            });

            document.getElementById('race-auto-camera').addEventListener('click', () => {
                if (raceManager.active) {
                    raceManager.toggleAutoCamera();
                }
            });

            document.getElementById('race-results').addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                if (btn.id === 'raceAgainBtn') {
                    document.getElementById('race-results').style.display = 'none';
                    raceManager.startRace();
                } else if (btn.id === 'normalModeBtn') {
                    raceManager.endRaceMode();
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
