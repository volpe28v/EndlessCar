<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エンドレスカー</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica', sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 170px;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            max-width: calc(100% - 190px); /* ボタン幅を考慮して調整 */
            z-index: 10;
        }
        #viewButtons {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
            flex-wrap: nowrap;
            justify-content: flex-start;
            max-width: 60px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .button-separator {
            width: 100%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.3);
            margin: 5px 0;
        }
        
        .weather-button {
            font-size: 16px !important;
            padding: 2px 6px !important;
        }
        
        .weather-button.active {
            background-color: rgba(100, 100, 255, 0.7);
        }
        
        /* ミニマップ用のスタイル */
        #minimap-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 130px;
            height: 120px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            z-index: 99;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        #minimap {
            height: 100px;
        }
        
        #speed-display {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            color: white;
            font-size: 12px;
            text-align: center;
            line-height: 20px;
            font-family: 'Helvetica', sans-serif;
            background-color: rgba(0, 0, 0, 0.3);
        }
        
        #minimap-label {
            position: absolute;
            top: 5px;
            left: 5px;
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
        }
        
        .viewButton {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid white;
            border-radius: 3px;
            padding: 4px 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-bottom: 3px;
            min-width: 30px;
            text-align: center; /* テキストを中央揃え */
            width: 100%; /* ボタンの幅を親要素に合わせる */
        }
        .viewButton:hover {
            background-color: rgba(50, 50, 50, 0.7);
        }
        .viewButton:active {
            transform: scale(0.95);
        }
        .viewButton.active {
            background-color: rgba(100, 100, 255, 0.7);
        }
        /* スマートフォン向け調整 */
        @media (max-width: 480px) {
            #info {
                left: 120px;
                font-size: 12px;
            }
            .viewButton {
                padding: 3px 4px;
                font-size: 10px;
                min-width: 24px;
            }
            #viewButtons {
                gap: 2px;
                max-width: 45px; /* スマホ向けにさらに小さく */
            }
            
            #minimap-container {
                width: 104px;
                height:100px;
                right: 55px;
            }
            #minimap {
                height: 80px;
            }
            
            /* スマホ向け時間モードボタン位置調整 */
            #timeToggle {
                right: 55px;
                top: 160px; /* 視点ボタンの下に配置 */
            }
            
            /* スマホ向け天気ボタン位置調整を削除 */
            #weatherToggle {
                right: 55px;
                top: 210px; /* 時間モードボタンの下に配置 */
            }
        }
        
        #timeWeatherInfo {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        #timeToggleButton {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            margin: 0 5px;
        }
        
        #timeToggleButton:hover {
            opacity: 0.8;
        }
        
        /* 天気ボタン用のスタイル追加 */
        .weather-button {
            font-size: 16px !important;
            padding: 2px 6px !important;
        }
        
        /* セパレーター用のスタイル */
        .button-separator {
            width: 100%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.3);
            margin: 5px 0;
        }
        /* BGMコントロール用のスタイル */
        #bgmControl {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 100;
        }
        
        #bgmControl button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #bgmControl button:hover {
            opacity: 0.8;
        }
        
        #bgmVolume {
            width: 80px;
            margin: 0 5px;
        }

        /* レースモード */
        #race-ui {
            position: absolute;
            top: 140px;
            left: 10px;
            z-index: 10;
        }
        #race-position-board {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 6px;
            border-radius: 5px;
            font-size: 11px;
            font-family: 'Helvetica', monospace;
            width: 130px;
        }
        #race-position-board table {
            width: 100%;
            border-collapse: collapse;
        }
        #race-position-board th, #race-position-board td {
            padding: 1px 3px;
            text-align: left;
            white-space: nowrap;
        }
        #race-position-board th {
            border-bottom: 1px solid rgba(255,255,255,0.3);
            font-size: 9px;
            color: #aaa;
        }
        #race-position-board tr.current-car {
            background-color: rgba(100, 100, 255, 0.3);
        }
        #race-lap-counter {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 3px 6px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 3px;
            text-align: center;
            width: 130px;
            box-sizing: border-box;
        }
        #race-countdown {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 120px;
            font-weight: bold;
            font-family: 'Helvetica', sans-serif;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }
        #race-results {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica', sans-serif;
        }
        #race-results h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        #race-results table {
            border-collapse: collapse;
            font-size: 16px;
            min-width: 400px;
        }
        #race-results th, #race-results td {
            padding: 6px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        #race-results th {
            color: #aaa;
            font-size: 13px;
        }
        #race-results .result-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        #race-results .result-buttons button {
            background-color: rgba(100, 100, 255, 0.7);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            padding: 10px 24px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #race-results .result-buttons button:hover {
            background-color: rgba(130, 130, 255, 0.9);
        }
        .fastest-lap {
            color: #ff00ff;
        }
        #race-predict {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Helvetica', sans-serif;
        }
        #race-predict-text {
            font-size: 16px;
            margin-bottom: 8px;
        }
        #race-predict-confirm {
            background-color: rgba(100, 100, 255, 0.7);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        #race-predict-confirm:hover {
            background-color: rgba(130, 130, 255, 0.9);
        }
        tr.predicted-car td {
            color: #ffdd00;
        }
        .race-auto-btn {
            width: 130px;
            box-sizing: border-box;
            margin-top: 3px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            padding: 3px 6px;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
        }
        .race-auto-btn.active {
            background-color: rgba(100, 100, 255, 0.7);
        }
        .race-auto-btn:hover {
            background-color: rgba(50, 50, 50, 0.7);
        }
        #race-position-board {
            pointer-events: auto;
        }
        #race-position-board tr:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        @media (max-width: 480px) {
            #race-ui {
                top: 110px;
                left: 10px;
            }
            #race-position-board {
                font-size: 10px;
                width: 104px;
            }
            #race-lap-counter {
                width: 104px;
                font-size: 11px;
            }
            #race-countdown {
                font-size: 80px;
            }
            #race-results table {
                font-size: 13px;
                min-width: auto;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>

<body>
    <div id="viewButtons">
        <div class="button-group view-buttons">
            <button class="viewButton" data-view="0" title="俯瞰視点 (1)">俯瞰</button>
            <button class="viewButton" data-view="1" title="追従視点 (2)">追従</button>
            <button class="viewButton" data-view="2" title="車載視点 (3)">車載</button>
            <button class="viewButton active" data-view="3" title="斜め上視点 (4)">斜め</button>
            <button class="viewButton" data-view="4" title="前方視点 (5)">前方</button>
        </div>
        <div class="button-separator"></div>
        <div class="button-group weather-buttons">
            <button class="viewButton weather-button" data-weather="sunny" title="晴れ">☀️</button>
            <button class="viewButton weather-button" data-weather="cloudy" title="曇り">☁️</button>
            <button class="viewButton weather-button" data-weather="rain" title="雨">🌧️</button>
            <button class="viewButton weather-button" data-weather="snow" title="雪">❄️</button>
        </div>
        <div class="button-separator"></div>
        <div class="button-group">
            <button class="viewButton" id="raceButton" title="レースモード">Race</button>
        </div>
    </div>
    <div id="bgmControl">
        <input type="range" id="bgmVolume" min="0" max="100" value="20" title="音量">
        <button id="muteBgm" title="ミュート">🔊</button>
    </div>
    <div id="minimap-container">
        <canvas id="minimap"></canvas>
        <div id="speed-display">0 km/h</div>
    </div>
    <div id="info">
        <div id="timeWeatherInfo" style="font-family: 'Helvetica', sans-serif;">
            <div class="info-row">
                <button id="timeToggleButton" title="現在の時刻に連動（クリックで切替）">🕒</button>
                <span id="currentTime">--:--</span>
                <span id="currentLocation"></span>
            </div>
            <div class="info-row">
                <span id="currentWeatherText">-</span>
            </div>
        </div>
    </div>
    <div id="race-ui" style="display:none;">
        <div id="race-position-board"></div>
        <div id="race-lap-counter"></div>
        <button id="race-auto-camera" class="race-auto-btn active" title="カメラ自動切替">Auto</button>
    </div>
    <div id="race-predict" style="display:none;">
        <div id="race-predict-text">TAB / クリックで優勝予想を選択</div>
        <button id="race-predict-confirm">この車に決定!</button>
    </div>
    <div id="race-countdown" style="display:none;"></div>
    <div id="race-results" style="display:none;"></div>
    <script type="module">
        import { Car } from './Car.js';
        
        // デバッグ用のログ
        function log(message) {
            console.log(`[${new Date().toISOString()}] ${message}`);
        }
        
        log("スクリプト開始");
        
        // 基本設定
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x646464); // 初期の空の色を設定
        document.body.appendChild(renderer.domElement);
        
        // グローバル定数の定義
        const HORIZONTAL_SCALE = 100; // x,z座標のスケール
        const VERTICAL_SCALE = 4;     // y座標(高さ)のスケール
        const roadWidth = 16;         // 道路の幅
        
        // トラックポイントの定義
        const originalTrackPoints = [
            [4, 0, 7],     // 4,7,0
            [1, 0, 7],     // 1,7,0
            [0, 1, 5],     // 0,5,1
            [0.5, 2, 4],   // 0.5,4,2
            [1.2, 2, 4.3], // 1.2,4.3,2
            [2.5, 2, 2.8], // 2.5,2.8,2
            [2, 5, 1],     // 2,1,3
            [2.7, 3, 0],   // 2.7,0,2.5
            [4, 0, 1],     // 4,1,0
            [4.4, 0, 0.8], // 4.4,0.8,0
            [5.9, 0, 1.8], // 5.9,1.8,0
            [5.7, 1, 2.1], // 5.7,2.1,1
            [4.2, 1, 2.2], // 4.2,2.2,1
            [3.7, 2, 2.9], // 3.7,2.9,2
            [3, 2, 4.7],   // 3,4.7,2
            [3.4, 1, 5.5], // 3.4,5.5,1
            [4.4, 1, 5.5], // 4.4,5.5,1
            [5.4, 2, 4.5], // 5.4,4.5,2
            [5.7, 2, 3.6], // 5.7,3.6,2
            [7.3, 1, 3],   // 7.3,3,1
            [8, 1, 3.3],   // 8,3.3,1
            [9.5, 2, 3.5], // 9.5,3.5,2
            [9, 1, 5],     // 9,5,1
            [7.9, 1, 5.7], // 7.9,5.7,1
            [7, 1, 5.3],   // 7,5.3,1
            [6, 0, 5.5],   // 6,5.5,0
            [4.9, 0, 7],   // 4.9,7,0
            [4, 0, 7]      // 4,7,0
        ];
        
        // スケールを適用してtrackPointsを生成
        const trackPoints = originalTrackPoints.map(point => [
            point[0] * HORIZONTAL_SCALE,
            point[1] * VERTICAL_SCALE,
            point[2] * HORIZONTAL_SCALE
        ]);
        
        // 道路を作成
        const roadGroup = new THREE.Group();
        scene.add(roadGroup);
        
        // 3Dパスポイントに変換
        const carPathPoints = [];
        for (let i = 0; i < trackPoints.length; i++) {
            // 高さ情報（Y軸）を考慮したポイントを作成
            carPathPoints.push(new THREE.Vector3(trackPoints[i][0], trackPoints[i][1] + 0.3, trackPoints[i][2]));
        }
        
        // カトマル・ロムスプラインで滑らかな曲線を作成
        const carPath = new THREE.CatmullRomCurve3(carPathPoints);
        carPath.closed = true; // 閉じたループに戻す
        
        // パスの詳細なポイントを取得（道路生成用）
        const detailedPathPoints = carPath.getPoints(500);
        
 
        
        // 車のオブジェクト配列
        const cars = [];
        let currentCarIndex = 0;
        
        // 車を作成して配列に追加する関数
        function createCars(count = 1) {
            // 既存の車のリソースを解放
            for (let car of cars) {
                car.dispose(scene);
            }
            cars.length = 0;
            
            // 新しい車を作成
            for (let i = 0; i < count; i++) {
                const car = new Car(carPath);
                car.position = i * (1.0 / count); // 均等に配置
                car.createObject(scene);
                cars.push(car);
            }
            for (let i = 0; i < count; i++) {
                const car = cars[i];
                car.setOtherCars(cars.filter(c => c !== car));  
            }
            
            log(`${count}台の車を作成しました`);
        }
        
        // === レースマネージャー ===
        let raceManager = null;

        class RaceManager {
            constructor() {
                this.phase = 'idle'; // 'idle' | 'grid' | 'countdown' | 'racing' | 'finished'
                this.carData = new Map();
                this.totalLaps = 10;
                this.fastestLap = { time: Infinity, car: null };
                this.raceStartTime = 0;
                this.active = false;
                this.autoCameraInterval = null;
                this.autoCameraMode = true;
                this.predictedCar = null;
            }

            get isActive() {
                return this.active;
            }

            startRace() {
                this.active = true;
                this.phase = 'grid';
                this.carData.clear();
                this.fastestLap = { time: Infinity, car: null };

                // Hide normal info, show race UI
                document.getElementById('info').style.display = 'none';
                document.getElementById('race-ui').style.display = 'block';
                document.getElementById('race-results').style.display = 'none';

                // Create 16 cars for race
                createCars(16);

                // Place cars on grid
                this.placeOnGrid();

                // Freeze all cars
                for (const car of cars) {
                    car.frozen = true;
                    this.carData.set(car, {
                        laps: 0,
                        lapTimes: [],
                        lapStartTime: 0,
                        lastPosition: car.position,
                        finished: false,
                        finishTime: 0,
                        gridPosition: 0,
                        totalDistance: 0,
                    });
                }

                // Set grid positions and initial totalDistance based on grid order
                const polePosition = cars[0].position;
                cars.forEach((car, i) => {
                    const data = this.carData.get(car);
                    data.gridPosition = i + 1;
                    // Front cars get higher initial distance so grid order = ranking order
                    let dist = car.position - polePosition;
                    if (dist > 0.5) dist -= 1;
                    if (dist < -0.5) dist += 1;
                    data.totalDistance = dist;
                });

                // Focus camera on last car (最後尾)
                currentCarIndex = cars.length - 1;
                this.predictedCar = null;

                // Show prediction UI - let user pick a car before countdown
                document.getElementById('race-predict').style.display = 'block';
            }

            confirmPrediction() {
                this.predictedCar = cars[currentCarIndex];
                document.getElementById('race-predict').style.display = 'none';
                // Start countdown after prediction confirmed
                setTimeout(() => this.startCountdown(), 500);
            }

            placeOnGrid() {
                // Grid: 2 columns, 8 rows, staggered (F1-style)
                const startPosition = 0.05;
                const rowSpacing = 0.005;
                const staggerOffset = 0.002; // right column slightly behind
                const lateralOffset = 2.5; // meters left/right from center

                for (let i = 0; i < cars.length; i++) {
                    const row = Math.floor(i / 2);
                    const col = i % 2; // 0 = left, 1 = right

                    const car = cars[i];
                    car.position = startPosition - row * rowSpacing - col * staggerOffset;
                    if (car.position < 0) car.position += 1.0;

                    // Set 3D position from path
                    const point = car.carPath.getPointAt(car.position);
                    const tangent = car.carPath.getTangentAt(car.position);

                    // Calculate lateral offset and apply to 3D position
                    const right = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                    const offsetSign = (col === 0 ? -1 : 1);
                    const offset = offsetSign * lateralOffset;

                    car.object.position.set(
                        point.x + right.x * offset,
                        point.y,
                        point.z + right.z * offset
                    );

                    // Store lateral offset so update() can maintain it initially
                    car.gridLateralOffset = offset;

                    // Face the car in the direction of the path
                    const forward = new THREE.Vector3(tangent.x, 0, tangent.z).normalize();
                    const up = new THREE.Vector3(0, 1, 0);
                    const rightDir = new THREE.Vector3().crossVectors(forward, up).normalize();
                    const rotMatrix = new THREE.Matrix4().makeBasis(rightDir, up, forward.clone().negate());
                    car.object.quaternion.setFromRotationMatrix(rotMatrix);
                }
            }

            startCountdown() {
                this.phase = 'countdown';
                const countdownEl = document.getElementById('race-countdown');
                countdownEl.style.display = 'flex';

                const steps = ['3', '2', '1', 'GO!'];
                let step = 0;

                const doStep = () => {
                    if (step < steps.length) {
                        countdownEl.textContent = steps[step];
                        countdownEl.style.color = step < 3 ? '#ff4444' : '#44ff44';
                        countdownEl.style.fontSize = step < 3 ? '120px' : '100px';
                        step++;

                        if (step <= steps.length) {
                            setTimeout(doStep, 1000);
                        }
                    } else {
                        // Hide countdown
                        countdownEl.style.display = 'none';
                    }
                };

                doStep();

                // After "GO!" (3 seconds for 3,2,1 + show GO for 1 sec)
                setTimeout(() => {
                    this.phase = 'racing';
                    this.raceStartTime = performance.now();

                    // Unfreeze all cars and record lap start time
                    for (const car of cars) {
                        car.frozen = false;
                        // Vary initial speed slightly to prevent bunching
                        car.speed = car.MIN_SPEED + Math.random() * (car.MAX_SPEED - car.MIN_SPEED) * 0.3;
                        const data = this.carData.get(car);
                        data.lapStartTime = this.raceStartTime;
                        data.lastPosition = car.position;
                    }

                    // Start auto camera switching (only if not manually selected)
                    if (this.autoCameraMode) {
                        this.startAutoCamera();
                    }
                }, 3000);
            }

            updateRace() {
                if (this.phase !== 'racing') return;

                const now = performance.now();
                let allFinished = true;

                for (const car of cars) {
                    const data = this.carData.get(car);
                    if (data.finished) continue;
                    allFinished = false;

                    // Track cumulative distance
                    const prev = data.lastPosition;
                    const curr = car.position;
                    let delta = curr - prev;
                    if (delta < -0.5) delta += 1; // wrap around 0
                    if (delta > 0.5) delta -= 1;  // backwards safety
                    data.totalDistance += delta;

                    if (prev > 0.8 && curr < 0.2) {
                        // Completed a lap
                        data.laps++;
                        const lapTime = now - data.lapStartTime;
                        data.lapTimes.push(lapTime);
                        data.lapStartTime = now;

                        // Check fastest lap
                        if (lapTime < this.fastestLap.time) {
                            this.fastestLap = { time: lapTime, car: car };
                        }

                        // Check if finished
                        if (data.laps >= this.totalLaps) {
                            data.finished = true;
                            data.finishTime = now - this.raceStartTime;
                        }
                    }

                    data.lastPosition = curr;
                }

                // Update race rank on each car (for aggressive PASS logic)
                const ranked = this.getRankedCars();
                ranked.forEach(([car], i) => {
                    car.raceRank = i + 1;
                    car.totalCars = cars.length;
                });

                // Check if all cars finished
                if (allFinished || this.getFinishedCount() >= cars.length) {
                    this.finishRace();
                }
            }

            getFinishedCount() {
                let count = 0;
                for (const [, data] of this.carData) {
                    if (data.finished) count++;
                }
                return count;
            }

            getRankedCars() {
                const entries = Array.from(this.carData.entries());
                return entries.sort((a, b) => {
                    const da = a[1], db = b[1];
                    // Finished cars first, sorted by finish time
                    if (da.finished && db.finished) return da.finishTime - db.finishTime;
                    if (da.finished) return -1;
                    if (db.finished) return 1;
                    // Sort by cumulative distance (accounts for grid position naturally)
                    return db.totalDistance - da.totalDistance;
                });
            }

            updateUI() {
                if (!this.active) return;

                const ranked = this.getRankedCars();
                this._cachedRanked = ranked; // cache for 3D label rendering
                const board = document.getElementById('race-position-board');
                const lapCounter = document.getElementById('race-lap-counter');

                // Position board
                let html = '<table><tr><th>P</th><th>Car</th><th>Lap</th><th>Gap</th></tr>';
                const leaderData = ranked[0]?.[1];

                ranked.forEach(([car, data], i) => {
                    const pos = i + 1;
                    const colorHex = '#' + (car.bodyColor || 0xffffff).toString(16).padStart(6, '0');
                    const isCurrent = cars.indexOf(car) === currentCarIndex;

                    let gap = '';
                    if (i === 0) {
                        if (this.phase !== 'racing') {
                            gap = '--';
                        } else if (data.finished) {
                            gap = this.formatTime(data.finishTime);
                        } else {
                            gap = this.formatTime(performance.now() - this.raceStartTime);
                        }
                    } else if (this.phase !== 'racing') {
                        gap = '--';
                    } else if (data.finished && leaderData?.finished) {
                        gap = '+' + this.formatTime(data.finishTime - leaderData.finishTime);
                    } else {
                        const lapDiff = (leaderData?.laps || 0) - data.laps;
                        if (lapDiff > 0) {
                            gap = '+' + lapDiff + 'L';
                        } else {
                            // パス位置差をリーダーのラップペースで秒に換算
                            let posDiff = ((ranked[0]?.[0]?.position || 0) - car.position + 1) % 1;
                            if (posDiff > 0.5) posDiff -= 1;
                            posDiff = Math.abs(posDiff);
                            const leaderLapMs = leaderData?.lapTimes?.length > 0
                                ? leaderData.lapTimes[leaderData.lapTimes.length - 1]
                                : (performance.now() - this.raceStartTime);
                            const gapMs = posDiff * leaderLapMs;
                            gap = '+' + this.formatTime(gapMs);
                        }
                    }

                    const fastestMark = (this.fastestLap.car === car && data.lapTimes.length > 0) ? ' class="fastest-lap"' : '';
                    const isPredicted = (this.predictedCar === car);
                    const classes = [isCurrent ? 'current-car' : '', isPredicted ? 'predicted-car' : ''].filter(Boolean).join(' ');
                    const rowAttr = classes ? ` class="${classes}"` : '';

                    const carIdx = cars.indexOf(car);
                    html += `<tr${rowAttr} data-car-index="${carIdx}" style="cursor:pointer;"><td>${pos}</td><td><span style="color:${colorHex};">■</span> ${car.driverName || ''}</td><td${fastestMark}>${data.laps}/${this.totalLaps}</td><td>${gap}</td></tr>`;
                });

                html += '</table>';
                board.innerHTML = html;

                // Lap counter - show current car's lap
                const currentCar = cars[currentCarIndex];
                if (currentCar) {
                    const currentData = this.carData.get(currentCar);
                    if (currentData) {
                        lapCounter.textContent = `LAP ${Math.min(currentData.laps + 1, this.totalLaps)} / ${this.totalLaps}`;
                    }
                }
            }

            formatTime(ms) {
                const totalSec = ms / 1000;
                const min = Math.floor(totalSec / 60);
                const sec = Math.floor(totalSec % 60);
                const msec = Math.floor((totalSec % 1) * 1000);
                if (min > 0) {
                    return `${min}:${sec.toString().padStart(2, '0')}.${msec.toString().padStart(3, '0')}`;
                }
                return `${sec}.${msec.toString().padStart(3, '0')}`;
            }

            finishRace() {
                this.phase = 'finished';
                this.stopAutoCamera();

                // Freeze all cars
                for (const car of cars) {
                    car.frozen = true;
                }

                // Show results
                const results = document.getElementById('race-results');
                const ranked = this.getRankedCars();

                let html = '<h2>RACE RESULTS</h2>';
                html += '<table><tr><th>Pos</th><th>Car</th><th>Time</th><th>Best Lap</th></tr>';

                ranked.forEach(([car, data], i) => {
                    const pos = i + 1;
                    const colorHex = '#' + (car.bodyColor || 0xffffff).toString(16).padStart(6, '0');
                    const time = data.finished ? this.formatTime(data.finishTime) : `DNF (${data.laps}L)`;
                    const bestLap = data.lapTimes.length > 0 ? this.formatTime(Math.min(...data.lapTimes)) : '--';
                    const isFastest = this.fastestLap.car === car && data.lapTimes.length > 0;
                    const bestLapClass = isFastest ? ' class="fastest-lap"' : '';

                    const resPredictClass = (this.predictedCar === car) ? ' class="predicted-car"' : '';
                    html += `<tr${resPredictClass}><td>${pos}</td><td><span style="color:${colorHex};">■</span> ${car.driverName || ''}</td><td>${time}</td><td${bestLapClass}>${bestLap}</td></tr>`;
                });

                html += '</table>';
                html += '<div class="result-buttons">';
                html += '<button id="raceAgainBtn">Race Again</button>';
                html += '<button id="normalModeBtn">Normal Mode</button>';
                html += '</div>';

                // Fastest lap info
                if (this.fastestLap.car) {
                    const flCar = this.fastestLap.car;
                    const flColor = '#' + (flCar.bodyColor || 0xffffff).toString(16).padStart(6, '0');
                    html += `<div style="margin-top:15px;" class="fastest-lap">Fastest Lap: <span style="color:${flColor};">■</span> ${this.formatTime(this.fastestLap.time)}</div>`;
                }

                results.innerHTML = html;
                results.style.display = 'flex';
            }

            endRaceMode() {
                this.active = false;
                this.phase = 'idle';
                this.stopAutoCamera();

                // Hide race UI
                document.getElementById('race-ui').style.display = 'none';
                document.getElementById('race-results').style.display = 'none';
                document.getElementById('race-countdown').style.display = 'none';
                document.getElementById('race-predict').style.display = 'none';

                // Show normal info
                document.getElementById('info').style.display = 'block';

                // Unfreeze and recreate cars normally
                for (const car of cars) {
                    car.frozen = false;
                }
                createCars(16);

            }

            startAutoCamera() {
                this.stopAutoCamera(); // 既存 interval をクリア
                this.autoCameraMode = true;
                this.autoCameraInterval = setInterval(() => {
                    if (!this.autoCameraMode || this.phase !== 'racing') return;
                    // Switch to a random car, preferring cars near the front
                    const ranked = this.getRankedCars();
                    // Pick from top 5 with higher probability
                    const topN = Math.min(5, ranked.length);
                    const idx = Math.random() < 0.7
                        ? Math.floor(Math.random() * topN)
                        : Math.floor(Math.random() * ranked.length);

                    currentCarIndex = cars.indexOf(targetCar);

                    // Randomly switch camera view (0-4)
                    cameraMode = Math.floor(Math.random() * 5);
                    updateButtonActiveState();
                }, 8000);
            }

            stopAutoCamera() {
                if (this.autoCameraInterval) {
                    clearInterval(this.autoCameraInterval);
                    this.autoCameraInterval = null;
                }
            }

            toggleAutoCamera() {
                this.autoCameraMode = !this.autoCameraMode;
                if (this.autoCameraMode && this.phase === 'racing') {
                    this.startAutoCamera();
                } else {
                    this.stopAutoCamera();

        }

        raceManager = new RaceManager();

        camera.position.set(100, 70, 90);
        
        log("Three.jsの基本設定完了");
        
        // 時間システムの追加

        // --- TimeModeState ステートパターン ---

        const TIME_MODE_CYCLE = [RealtimeState, AutoState, FastForwardState];

        function transitionTimeTo(StateClass) {

        function toggleTimeMode() {

            const nextIndex = (currentIndex + 1) % TIME_MODE_CYCLE.length;

        let timeModeState = new RealtimeState();
        let lastCameraChangeTime = Date.now(); // 最後にカメラが変更された時刻
        let cameraChangeInterval = 30000; // カメラ変更の間隔（ミリ秒）
        let availableCameraModes = [0, 1, 2, 3, 4]; // 利用可能なカメラモード

        let currentFrameTime = Date.now(); // グローバル変数として定義
        let weatherApiKey = '2416f36c5b6368d2de6d3016e34ae8f8'; // OpenWeatherMap APIキー
        
        // レンダリングキャッシュ（一時カラー・街灯・ミニマップ等）
        class RenderCache {

        const renderCache = new RenderCache();

        // 天気システム
        class WeatherSystem {
            constructor(scene) {
                this.scene = scene;
                this.current = 'sunny';
                this.rainParticles = null;
                this.snowParticles = null;
                this.cloudParticles = null;
                this.isRaining = false;
                this.isSnowing = false;
                this.isCloudy = false;
                this.lastChangeTime = Date.now();
                this.changeInterval = 30000;
                this.available = ['sunny', 'cloudy', 'rain', 'snow'];
            }

            createRainParticles() {
                const rainGeometry = new THREE.BufferGeometry();
                const rainCount = 7500;
                const rainPositions = new Float32Array(rainCount * 6);
                const rainSpeeds = new Float32Array(rainCount);
                const rainSwayFactors = new Float32Array(rainCount);
                const rainPhases = new Float32Array(rainCount);

                for (let i = 0; i < rainCount; i++) {
                    const baseIndex = i * 6;
                    const x = Math.random() * 2000 - 1000;
                    const y = Math.random() * 1000;
                    const z = Math.random() * 2000 - 1000;
                    rainPositions[baseIndex] = x;
                    rainPositions[baseIndex + 1] = y;
                    rainPositions[baseIndex + 2] = z;
                    rainPositions[baseIndex + 3] = x;
                    rainPositions[baseIndex + 4] = y - 10;
                    rainPositions[baseIndex + 5] = z;
                    rainSpeeds[i] = 20.0 + Math.random() * 10.0;
                    rainSwayFactors[i] = 0.1 + Math.random() * 0.2;
                    rainPhases[i] = Math.random() * Math.PI * 2;
                }

                rainGeometry.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
                const rainMaterial = new THREE.LineBasicMaterial({
                    color: 0x99ccff,
                    opacity: 0.4,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                this.rainParticles = new THREE.LineSegments(rainGeometry, rainMaterial);
                this.rainParticles.visible = false;
                this.scene.add(this.rainParticles);
                this.rainParticles.userData = {
                    positions: rainPositions,
                    speeds: rainSpeeds,
                    swayFactors: rainSwayFactors,
                    phases: rainPhases
                };
            }

            createSnowParticles() {
                const snowGeometry = new THREE.BufferGeometry();
                const snowCount = 5000;
                const snowPositions = new Float32Array(snowCount * 3);
                const snowSpeeds = new Float32Array(snowCount);
                const snowSwayFactors = new Float32Array(snowCount);
                const snowPhases = new Float32Array(snowCount);

                for (let i = 0; i < snowCount * 3; i += 3) {
                    snowPositions[i] = Math.random() * 2000 - 1000;
                    snowPositions[i + 1] = Math.random() * 1000;
                    snowPositions[i + 2] = Math.random() * 2000 - 1000;
                    const index = i / 3;
                    snowSpeeds[index] = 0.5 + Math.random() * 1.0;
                    snowSwayFactors[index] = 0.3 + Math.random() * 0.4;
                    snowPhases[index] = Math.random() * Math.PI * 2;
                }

                snowGeometry.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
                const snowMaterial = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 2,
                    opacity: 0.8,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                this.snowParticles = new THREE.Points(snowGeometry, snowMaterial);

                    positions: snowPositions,

                };

            createCloudParticles() {
                const cloudGeometry = new THREE.BufferGeometry();
                const cloudCount = 500;
                const cloudPositions = new Float32Array(cloudCount * 3);
                const cloudSizes = new Float32Array(cloudCount);

                for (let i = 0; i < cloudCount * 3; i += 3) {
                    cloudPositions[i] = Math.random() * 3000 - 1500;
                    cloudPositions[i+1] = 300 + Math.random() * 500;
                    cloudPositions[i+2] = Math.random() * 3000 - 1500;
                    cloudSizes[i/3] = 20.0 + Math.random() * 30.0;
                }

                cloudGeometry.setAttribute('position', new THREE.BufferAttribute(cloudPositions, 3));
                cloudGeometry.setAttribute('size', new THREE.BufferAttribute(cloudSizes, 1));

                const cloudTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/cloud10.png');
                const cloudMaterial = new THREE.PointsMaterial({
                    color: 0xcccccc,
                    size: 30.0,
                    transparent: true,
                    opacity: 0.7,
                    map: cloudTexture,

                this.cloudParticles = new THREE.Points(cloudGeometry, cloudMaterial);
                this.cloudParticles.visible = false;
                this.scene.add(this.cloudParticles);

            change(weather, isFromCurrentLocation = false, temperature = null, windSpeed = null) {
                this.current = weather;
                updateWeatherDisplay(weather, isFromCurrentLocation, temperature, windSpeed);
                updateWeatherButtonState(weather);

                switch(weather) {
                    case 'sunny':
                        this.isRaining = false;
                        this.isSnowing = false;
                        this.isCloudy = false;
                        if (this.rainParticles) this.rainParticles.visible = false;
                        if (this.snowParticles) this.snowParticles.visible = false;
                        if (this.cloudParticles) this.cloudParticles.visible = false;
                        applyWeatherEnvironment('sunny');
                        break;
                    case 'cloudy':
                        this.isRaining = false;
                        this.isSnowing = false;
                        this.isCloudy = true;
                        if (this.rainParticles) this.rainParticles.visible = false;
                        if (this.snowParticles) this.snowParticles.visible = false;
                        if (this.cloudParticles) this.cloudParticles.visible = true;
                        applyWeatherEnvironment('cloudy');
                        break;
                    case 'rain':
                        this.isRaining = true;
                        this.isSnowing = false;
                        this.isCloudy = true;
                        if (this.rainParticles) this.rainParticles.visible = true;
                        if (this.snowParticles) this.snowParticles.visible = false;
                        if (this.cloudParticles) this.cloudParticles.visible = true;
                        applyWeatherEnvironment('rain');
                        break;
                    case 'snow':
                        this.isRaining = false;
                        this.isSnowing = true;
                        this.isCloudy = true;
                        if (this.rainParticles) this.rainParticles.visible = false;
                        if (this.snowParticles) this.snowParticles.visible = true;
                        if (this.cloudParticles) this.cloudParticles.visible = true;
                        applyWeatherEnvironment('snow');
                        break;
                }
            }

            update(deltaTime, camera) {
                const currentTime = Date.now();

                // 早送りモード時の天気自動変更
                if (timeModeState.shouldAutoChangeWeather()) {
                    if (currentTime - this.lastChangeTime > this.changeInterval) {
                        const availableChoices = this.available.filter(w => w !== this.current);
                        const nextWeather = availableChoices[Math.floor(Math.random() * availableChoices.length)];
                        this.change(nextWeather);
                        this.lastChangeTime = currentTime;
                        this.changeInterval = 20000 + Math.random() * 20000;
                    }
                }

                // オート・早送りモード時のカメラ自動切り替え
                if (timeModeState.shouldAutoSwitch()) {
                    if (currentTime - lastCameraChangeTime > cameraChangeInterval) {
                        const availableViews = availableCameraModes.filter(mode => mode !== cameraMode);
                        const nextCameraMode = availableViews[Math.floor(Math.random() * availableViews.length)];
                        cameraMode = nextCameraMode;
                        updateCameraButtonState();

                        lastCameraChangeTime = currentTime;
                        cameraChangeInterval = 10000 + Math.random() * 5000;
                    }
                }

                // 雲のアニメーション
                if (this.isCloudy && this.cloudParticles) {
                    this.cloudParticles.visible = true;
                    this.cloudParticles.position.x = camera.position.x;
                    this.cloudParticles.position.z = camera.position.z;
                } else if (this.cloudParticles) {
                    this.cloudParticles.visible = false;
                }

                // 雨のアニメーション
                if (this.isRaining && this.rainParticles) {
                    const positions = this.rainParticles.userData.positions;
                    const speeds = this.rainParticles.userData.speeds;
                    const swayFactors = this.rainParticles.userData.swayFactors;
                    const phases = this.rainParticles.userData.phases;
                    const time = Date.now() * 0.001;

                    for (let i = 0; i < positions.length; i += 6) {
                        const index = i / 6;
                        positions[i + 1] -= speeds[index] * deltaTime;
                        positions[i + 4] -= speeds[index] * deltaTime;
                        const swayAmount = swayFactors[index];
                        const phase = phases[index];
                        const swayX = Math.sin(time + phase) * swayAmount * 0.1 * deltaTime;
                        const swayZ = Math.cos(time * 0.8 + phase) * swayAmount * 0.1 * deltaTime;
                        positions[i] += swayX;
                        positions[i + 2] += swayZ;
                        positions[i + 3] += swayX;
                        positions[i + 5] += swayZ;
                        if (positions[i + 4] < 0) {
                            const x = Math.random() * 2000 - 1000;
                            const y = 1000;
                            const z = Math.random() * 2000 - 1000;
                            positions[i] = x;
                            positions[i + 1] = y;
                            positions[i + 2] = z;
                            positions[i + 3] = x;
                            positions[i + 4] = y - 10;
                            positions[i + 5] = z;
                        }
                    }
                    this.rainParticles.position.x = camera.position.x;
                    this.rainParticles.position.z = camera.position.z;
                    this.rainParticles.geometry.attributes.position.needsUpdate = true;
                } else if (this.rainParticles) {
                    this.rainParticles.visible = false;
                }

                // 雪のアニメーション
                if (this.isSnowing && this.snowParticles) {
                    const positions = this.snowParticles.userData.positions;
                    const speeds = this.snowParticles.userData.speeds;
                    const swayFactors = this.snowParticles.userData.swayFactors;
                    const phases = this.snowParticles.userData.phases;
                    const time = Date.now() * 0.001;

                    for (let i = 0; i < positions.length; i += 3) {
                        const index = i / 3;
                        positions[i + 1] -= speeds[index] * deltaTime;
                        const swayAmount = swayFactors[index];
                        const phase = phases[index];
                        positions[i] += Math.sin(time + phase) * swayAmount * 0.1 * deltaTime;
                        positions[i + 2] += Math.cos(time * 0.8 + phase) * swayAmount * 0.1 * deltaTime;
                        if (positions[i + 1] < 0) {
                            positions[i] = Math.random() * 2000 - 1000;
                            positions[i + 1] = 1000;
                            positions[i + 2] = Math.random() * 2000 - 1000;
                        }
                    }
                    this.snowParticles.position.x = camera.position.x;
                    this.snowParticles.position.z = camera.position.z;
                    this.snowParticles.geometry.attributes.position.needsUpdate = true;
                } else if (this.snowParticles) {
                    this.snowParticles.visible = false;
                }
            }

            dispose() {
                for (const p of [this.rainParticles, this.snowParticles, this.cloudParticles]) {
                    if (p) { p.geometry.dispose(); p.material.dispose(); this.scene.remove(p); }
                }
                this.rainParticles = this.snowParticles = this.cloudParticles = null;
            }
        }

        // アスファルト部分を作成
        function createRoadSurface() {
            // 道路の左右のエッジを計算
            const leftEdgePoints = [];
            const rightEdgePoints = [];
            
            for (let i = 0; i < detailedPathPoints.length; i++) {
                const point = detailedPathPoints[i];
                const nextPoint = detailedPathPoints[(i + 1) % detailedPathPoints.length];
                
                // 進行方向ベクトルを計算
                const direction = new THREE.Vector3().subVectors(nextPoint, point).normalize();
                
                // 上向きベクトル（法線）を計算
                // 高さの変化を考慮した法線ベクトルを計算する（地形に沿った道路）
                const up = new THREE.Vector3(0, 1, 0);
                
                // 右向きベクトル（進行方向と上向きの外積）
                const right = new THREE.Vector3().crossVectors(direction, up).normalize();
                
                // 修正した上向きベクトル（進行方向と右向きの外積）
                const correctedUp = new THREE.Vector3().crossVectors(right, direction).normalize();
                
                // 道路の左右のエッジを計算（修正した法線ベクトルを使用）
                const leftEdge = new THREE.Vector3().addVectors(point, right.clone().multiplyScalar(roadWidth / 2));
                const rightEdge = new THREE.Vector3().addVectors(point, right.clone().multiplyScalar(-roadWidth / 2));
                
                // 高さを維持（道路面の高さは既にdetailedPathPointsに含まれる）
                // 道路を少し浮かせる（0.05）
                leftEdge.y += 0.05;
                rightEdge.y += 0.05;
                
                leftEdgePoints.push(leftEdge);
                rightEdgePoints.push(rightEdge);
            }
            
            // 道路の表面を三角形メッシュで作成
            const roadGeometry = new THREE.BufferGeometry();
            const vertices = [];
            const indices = [];
            
            // すべてのポイントを頂点配列に追加
            for (let i = 0; i < leftEdgePoints.length; i++) {
                vertices.push(leftEdgePoints[i].x, leftEdgePoints[i].y, leftEdgePoints[i].z);
                vertices.push(rightEdgePoints[i].x, rightEdgePoints[i].y, rightEdgePoints[i].z);
            }
            
            // 三角形インデックスを作成
            for (let i = 0; i < leftEdgePoints.length - 1; i++) {
                const v0 = i * 2;
                const v1 = v0 + 1;
                const v2 = v0 + 2;
                const v3 = v0 + 3;
                
                // 2つの三角形で四角形を作成
                indices.push(v0, v1, v2);
                indices.push(v2, v1, v3);
            }
            
            // 最後の部分を閉じる
            const v0 = (leftEdgePoints.length - 1) * 2;
            const v1 = v0 + 1;
            const v2 = 0;
            const v3 = 1;
            
            indices.push(v0, v1, v2);
            indices.push(v2, v1, v3);
            
            roadGeometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            roadGeometry.setIndex(indices);
            roadGeometry.computeVertexNormals();
            
            const roadMaterial = new THREE.MeshStandardMaterial({
                color: 0x333333,    // より暗めのグレーに
                roughness: 0.98,    // roughnessを最大限に近く設定
                metalness: 0.05,    // metalnessをさらに下げて光の反射を抑える
                side: THREE.DoubleSide
            });
            
            const roadMesh = new THREE.Mesh(roadGeometry, roadMaterial);
            roadGroup.add(roadMesh);
            
            // 白線（実線）を作成 - 削除
            // createRoadLine(detailedPathPoints, 0.05, 0xFFFFFF);
            
            // 縁石を作成（コーナー部分） - 削除
            // createCurbstones();
            
            return roadMesh;
        }

        // 縁石を作成（コース全体の両側に沿って）
        function createCurbstones() {
            // 縁石の間隔（パスの割合）- 滑らかな見た目のために密に配置
            const curbSpacing = 0.001; // 0.003から0.001へ変更してセグメント数を3倍に増加
            
            // 縁石用のグループを作成
            const curbGroup = new THREE.Group();
            roadGroup.add(curbGroup);
            
            // 道路の両側に縁石を設置
            createSideCurb(1);  // 右側
            createSideCurb(-1); // 左側
            
            // 特定の側（右側または左側）に縁石を作成する関数
            function createSideCurb(side) {
                // 縁石の頂点とインデックスを収集
                const curbVertices = [];
                const curbIndices = [];
                const curbNormals = [];
                
                let vertexIndex = 0;
                let currentT = 0;
                
                // 縁石の頂点データを生成
                while (currentT < 1) {
                    const point = carPath.getPointAt(currentT);
                    const tangent = carPath.getTangentAt(currentT);
                    
                    // 垂直方向ベクトル（外側方向）
                    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                    
                    // 次のポイントと前のポイントを取得して傾斜を計算
                    const nextT = (currentT + 0.005) % 1;
                    const prevT = (currentT - 0.005 + 1) % 1;
                    const nextPoint = carPath.getPointAt(nextT);
                    const prevPoint = carPath.getPointAt(prevT);
                    
                    // 縁石の基本位置（道路のエッジ、side=1で右側、side=-1で左側）
                    const edgePosition = new THREE.Vector3().addVectors(
                        point,
                        normal.clone().multiplyScalar(side * (roadWidth / 2))
                    );
                    
                    // 縁石の外側位置
                    const outerPosition = new THREE.Vector3().addVectors(
                        point,
                        normal.clone().multiplyScalar(side * (roadWidth / 2 + 0.2)) // 0.3から0.2へ変更して幅を狭く
                    );
                    
                    // 頂点を追加（縁石の4つの角）
                    // 1. 道路側の下部
                    curbVertices.push(
                        edgePosition.x, 
                        point.y, 
                        edgePosition.z
                    );
                    
                    // 2. 道路側の上部
                    curbVertices.push(
                        edgePosition.x, 
                        point.y + 0.12, // 高さを少し低くして0.15から0.12へ
                        edgePosition.z
                    );
                    
                    // 3. 外側の上部
                    curbVertices.push(
                        outerPosition.x, 
                        point.y + 0.12, // 高さを少し低くして0.15から0.12へ
                        outerPosition.z
                    );
                    
                    // 4. 外側の下部
                    curbVertices.push(
                        outerPosition.x, 
                        point.y, 
                        outerPosition.z
                    );
                    
                    // 法線ベクトルを追加（縁石の各頂点の法線）
                    const upVector = new THREE.Vector3(0, 1, 0);
                    const sideNormal = normal.clone().multiplyScalar(side);
                    
                    // 下部の道路側は下向き法線
                    curbNormals.push(0, -1, 0);
                    
                    // 道路側の上部は内側向き法線
                    curbNormals.push(-sideNormal.x, 0, -sideNormal.z);
                    
                    // 外側の上部は上向き法線
                    curbNormals.push(0, 1, 0);
                    
                    // 外側の下部は外側向き法線
                    curbNormals.push(sideNormal.x, 0, sideNormal.z);
                    
                    // インデックスを追加（縁石の面を定義）
                    if (vertexIndex > 0) {
                        const baseIdx = vertexIndex * 4;
                        const prevBaseIdx = (vertexIndex - 1) * 4;
                        
                        // 上面（四角形）
                        curbIndices.push(
                            prevBaseIdx + 1, baseIdx + 1, prevBaseIdx + 2,
                            prevBaseIdx + 2, baseIdx + 1, baseIdx + 2
                        );
                        
                        // 外側面（四角形）
                        curbIndices.push(
                            prevBaseIdx + 2, baseIdx + 2, prevBaseIdx + 3,
                            prevBaseIdx + 3, baseIdx + 2, baseIdx + 3
                        );
                        
                        // 内側面（四角形）
                        curbIndices.push(
                            prevBaseIdx, baseIdx, prevBaseIdx + 1,
                            prevBaseIdx + 1, baseIdx, baseIdx + 1
                        );
                    }
                    
                    vertexIndex++;
                    currentT += curbSpacing;
                }
                
                // 最後の縁石を最初の縁石に接続（ループを閉じる）
                const lastBaseIdx = (vertexIndex - 1) * 4;
                
                // 上面の接続
                curbIndices.push(
                    lastBaseIdx + 1, 1, lastBaseIdx + 2,
                    lastBaseIdx + 2, 1, 2
                );
                
                // 外側面の接続
                curbIndices.push(
                    lastBaseIdx + 2, 2, lastBaseIdx + 3,
                    lastBaseIdx + 3, 2, 3
                );
                
                // 内側面の接続
                curbIndices.push(
                    lastBaseIdx, 0, lastBaseIdx + 1,
                    lastBaseIdx + 1, 0, 1
                );
                
                // 縁石のジオメトリを作成
                const curbGeometry = new THREE.BufferGeometry();
                curbGeometry.setAttribute('position', new THREE.Float32BufferAttribute(curbVertices, 3));
                curbGeometry.setAttribute('normal', new THREE.Float32BufferAttribute(curbNormals, 3));
                curbGeometry.setIndex(curbIndices);
                
                // コンクリート風の材質
                const curbMaterial = new THREE.MeshStandardMaterial({
                    color: 0xE8E8E8, // 少し明るい色に変更
                    roughness: 0.9,  // より粗い質感に
                    metalness: 0.05, // わずかな光沢を追加
                    flatShading: false // スムーズシェーディング
                });
                
                // 縁石メッシュを作成
                const curbMesh = new THREE.Mesh(curbGeometry, curbMaterial);
                curbGroup.add(curbMesh);
            }
        }
        
        // ガードレールを作成（コース全体の外側）
        function createGuardrails() {
            // ガードレールの間隔（パスの割合）
            const railSpacing = 0.005; // より密に配置
            const postSpacing = 0.025; // 支柱の間隔
            
            // ガードレール用のグループを作成
            const guardrailGroup = new THREE.Group();
            roadGroup.add(guardrailGroup);
            
            // 道路の両側にガードレールを設置
            createSideGuardrail(1); // 右側
            createSideGuardrail(-1); // 左側
            
            // 特定の側（右側または左側）にガードレールを作成する関数
            function createSideGuardrail(side) {
                // 連続したガードレールのセグメントを格納する配列
                const railSegments = [];
                const railPosts = [];
                
                // ガードレール用の頂点とインデックスを収集
                const railVertices = [];
                const railIndices = [];
                const railUvs = [];
                
                let vertexIndex = 0;
                let currentT = 0;
                
                // ガードレールの頂点データを生成
                while (currentT < 1) {
                    const point = carPath.getPointAt(currentT);
                    const tangent = carPath.getTangentAt(currentT);
                    
                    // 次のポイントと前のポイントを取得して傾斜を計算
                    const nextT = (currentT + 0.005) % 1;
                    const prevT = (currentT - 0.005 + 1) % 1;
                    const nextPoint = carPath.getPointAt(nextT);
                    const prevPoint = carPath.getPointAt(prevT);
                    
                    // 垂直方向ベクトル（外側方向）
                    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                    
                    // ガードレールの位置（道路の外側、side=1で右側、side=-1で左側）
                    const railPosition = new THREE.Vector3().addVectors(
                        point,
                        normal.clone().multiplyScalar(side * (roadWidth / 2 + 1.2))
                    );
                    
                    // 前後方向の傾斜角を計算
                    const slopeDistance = Math.sqrt(
                        Math.pow(nextPoint.x - prevPoint.x, 2) + 
                        Math.pow(nextPoint.z - prevPoint.z, 2));
                    const slope = Math.atan2(nextPoint.y - prevPoint.y, slopeDistance);
                    
                    // ガードレールの高さ調整
                    const railHeight = point.y + 0.8; // 道路面から少し高く
                    
                    // ガードレールの上部と下部の頂点を追加
                    const topRailPos = new THREE.Vector3(
                        railPosition.x,
                        railHeight + 0.4, // 上部の高さ
                        railPosition.z
                    );
                    
                    const bottomRailPos = new THREE.Vector3(
                        railPosition.x,
                        railHeight, // 下部の高さ
                        railPosition.z
                    );
                    
                    // 支柱を作成（一定間隔ごと）
                    if (Math.abs(currentT % postSpacing) < railSpacing) {
                        const postGeometry = new THREE.CylinderGeometry(0.08, 0.08, 1.0, 6);
                        const postMaterial = new THREE.MeshLambertMaterial({ color: 0x888888 });
                        const post = new THREE.Mesh(postGeometry, postMaterial);
                        
                        // 支柱の位置を設定
                        post.position.copy(new THREE.Vector3(
                            railPosition.x,
                            point.y + 0.5, // 地面からの高さ
                            railPosition.z
                        ));
                        
                        // 支柱を少し内側に傾ける
                        const postLookAt = new THREE.Vector3().addVectors(
                            post.position,
                            normal.clone().multiplyScalar(-0.1 * side) // 内側に少し傾ける
                        );
                        post.lookAt(postLookAt);
                        post.rotateX(Math.PI / 2); // 支柱の向きを修正
                        
                        // 上下の傾斜に合わせて追加の回転
                        post.rotateZ(slope); // X軸ではなくZ軸で回転（支柱の向きが変わっているため）
                        
                        guardrailGroup.add(post);
                        railPosts.push(post);
                    }
                    
                    // 頂点データを追加
                    railVertices.push(
                        topRailPos.x, topRailPos.y, topRailPos.z,
                        bottomRailPos.x, bottomRailPos.y, bottomRailPos.z
                    );
                    
                    // テクスチャ座標を追加
                    railUvs.push(
                        currentT * 20, 0, // 上部のUV座標
                        currentT * 20, 1  // 下部のUV座標
                    );
                    
                    // インデックスを追加（四角形を作成）
                    if (vertexIndex > 0) {
                        // 各セグメント間を三角形で接続
                        railIndices.push(
                            vertexIndex * 2 - 2, vertexIndex * 2, vertexIndex * 2 - 1, // 最初の三角形
                            vertexIndex * 2 - 1, vertexIndex * 2, vertexIndex * 2 + 1  // 二番目の三角形
                        );
                    }
                    
                    vertexIndex++;
                    currentT += railSpacing;
                }
                
                // 最後のセグメントを最初のセグメントと接続して閉じる
                railIndices.push(
                    (vertexIndex - 1) * 2, 0, (vertexIndex - 1) * 2 + 1, // 最初の三角形
                    (vertexIndex - 1) * 2 + 1, 0, 1  // 二番目の三角形
                );
                
                // ガードレールのジオメトリを作成
                const railGeometry = new THREE.BufferGeometry();
                railGeometry.setAttribute('position', new THREE.Float32BufferAttribute(railVertices, 3));
                railGeometry.setAttribute('uv', new THREE.Float32BufferAttribute(railUvs, 2));
                railGeometry.setIndex(railIndices);
                railGeometry.computeVertexNormals();
                
                // 高速道路のガードレールらしい素材
                const railMaterial = new THREE.MeshLambertMaterial({
                    color: 0xE0E0E0,
                    side: THREE.DoubleSide,
                    flatShading: false
                });
                
                // ガードレールメッシュを作成
                const railMesh = new THREE.Mesh(railGeometry, railMaterial);
                guardrailGroup.add(railMesh);
            }
        }

        // 高層道路の柱を生成する関数
        function createRoadPillars() {
            const pillarGroup = new THREE.Group();
            roadGroup.add(pillarGroup);
            
            // 柱の間隔（パスの割合）
            const pillarSpacing = 0.04; // 約25本の柱
            
            // コース全体に柱を配置
            let currentT = 0;
            while (currentT < 1) {
                const point = carPath.getPointAt(currentT);
                const tangent = carPath.getTangentAt(currentT);
                
                // 地上からの高さが1以上の場合のみ柱を設置
                if (point.y > 1) {
                    // 道路の左右に柱を設置
                    createSinglePillar(point, tangent, 1);  // 右側
                    createSinglePillar(point, tangent, -1); // 左側
                }
                
                currentT += pillarSpacing;
            }
            
            // 1本の柱を生成する関数
            function createSinglePillar(point, tangent, side) {
                // 垂直方向ベクトル（外側方向）
                const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                
                // 柱の位置（道路の外側）
                const pillarPosition = new THREE.Vector3().addVectors(
                    point,
                    normal.clone().multiplyScalar(side * (roadWidth / 2 - 1))
                );
                
                // 柱の高さを計算（地上から道路面まで）
                const pillarHeight = point.y;
                
                // 柱のジオメトリとマテリアル
                const pillarGeometry = new THREE.BoxGeometry(2, pillarHeight, 2);
                const pillarMaterial = new THREE.MeshLambertMaterial({ 
                    color: 0x888888,
                    roughness: 0.7,
                    metalness: 0.3
                });
                
                const pillar = new THREE.Mesh(pillarGeometry, pillarMaterial);
                
                // 柱の位置を設定（Y座標は高さの半分）
                pillar.position.set(
                    pillarPosition.x,
                    pillarHeight / 2,
                    pillarPosition.z
                );
                
                pillarGroup.add(pillar);
            }
        }
        
        // 高層道路の柱を生成
        createRoadPillars();
        
        // ガードレールの作成
        createCurbstones();
        
        log("道路の作成完了");

        function placeEnvironmentObjects() {
