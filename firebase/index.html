<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EndlessCar - Multiplayer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica', sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 170px;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            max-width: calc(100% - 190px);
            z-index: 10;
        }
        /* 右上パネル（コース + 視点ボタン） */
        #top-right-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
        }

        #minimap-container {
            width: 130px;
            height: 120px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        #minimap {
            height: 100px;
        }

        #speed-display {
            height: 20px;
            color: white;
            font-size: 12px;
            text-align: center;
            line-height: 20px;
            font-family: 'Helvetica', sans-serif;
            background-color: rgba(0, 0, 0, 0.3);
        }

        #view-buttons-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-top: 4px;
            width: 130px;
        }

        .viewButton {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 3px;
            padding: 5px 0;
            font-size: 11px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .viewButton:hover {
            background-color: rgba(50, 50, 50, 0.7);
        }
        .viewButton:active {
            transform: scale(0.95);
        }
        .viewButton.active {
            background-color: rgba(100, 100, 255, 0.7);
            border-color: rgba(130, 130, 255, 0.8);
        }
        @media (max-width: 480px) {
            #minimap-container {
                width: 100px;
                height: 95px;
            }
            #minimap {
                height: 75px;
            }
            #view-buttons-row {
                width: 100px;
            }
            .viewButton {
                font-size: 9px;
                padding: 4px 0;
            }
        }

        #timeWeatherInfo {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #timeToggleButton {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            margin: 0 5px;
        }

        #timeToggleButton:hover {
            opacity: 0.8;
        }


        /* 世界情報（地図直下） */
        #world-info {
            background-color: rgba(0, 0, 0, 0.65);
            color: white;
            padding: 8px 10px;
            border-radius: 5px;
            margin-top: 4px;
            transition: all 0.3s ease;
        }
        #world-info.remote {
            border-left: 3px solid rgba(100, 150, 255, 0.7);
        }
        #world-location {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 2px;
        }
        #world-detail {
            display: block;
            font-size: 11px;
            color: #ccc;
        }
        /* 接続数 + プレイヤーリスト */
        #player-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
        }
        #worldmap-container {
            background-color: rgba(10, 20, 40, 0.75);
            border-radius: 4px;
            margin-bottom: 4px;
            position: relative;
            cursor: pointer;
        }
        #worldmap {
            display: block;
            border-radius: 4px;
        }
        #player-count {
            background-color: rgba(0, 0, 0, 0.5);
            color: #66ff66;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-top: 3px;
        }
        /* ウェルカムオーバーレイ */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        #welcome-box {
            text-align: center;
            color: white;
            max-width: 360px;
            padding: 30px;
        }
        #welcome-box h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            margin: 0 0 24px 0;
        }
        #welcome-box p {
            font-size: 14px;
            line-height: 1.8;
            color: #bbb;
            margin: 0 0 28px 0;
        }
        #welcome-start {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 12px 36px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        #welcome-start:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
        }
        #welcome-note {
            font-size: 11px;
            color: #666;
            margin-top: 16px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.6.9/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/FBXLoader.js"></script>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="welcome-overlay">
        <div id="welcome-box">
            <h1>EndlessCar</h1>
            <p>
                Just watch the cars drift endlessly.<br><br>
                Your visit adds a car to the track.<br>
                It carries your sky — your weather, your time.<br><br>
                Tap a pin on the world map<br>
                to ride with someone across the globe.<br>
                Their weather becomes yours.
            </p>
            <button id="welcome-start">Start Watching</button>
            <div id="welcome-note">Location is used to show local weather</div>
        </div>
    </div>
    <div id="top-right-panel">
        <div id="minimap-container">
            <canvas id="minimap"></canvas>
            <div id="speed-display">0 km/h</div>
        </div>
        <div id="view-buttons-row" class="view-buttons">
            <button class="viewButton" data-view="0" title="Bird's Eye (1)">Bird</button>
            <button class="viewButton" data-view="1" title="Chase (2)">Chase</button>
            <button class="viewButton" data-view="2" title="Onboard (3)">FPV</button>
            <button class="viewButton active" data-view="3" title="Angle (4)">Angle</button>
            <button class="viewButton" data-view="4" title="Front (5)">Front</button>
            <button class="viewButton" data-view="5" title="Overview (6)">All</button>
        </div>
    </div>
    <!-- 非表示だがJS参照用にDOMは残す -->
    <div id="info" style="display:none;">
        <button id="timeToggleButton">🕒</button>
        <span id="currentTime"></span>
        <span id="currentLocation"></span>
        <span id="currentWeatherText"></span>
    </div>
    <div id="player-panel">
        <div id="worldmap-container">
            <canvas id="worldmap" width="200" height="100"></canvas>
        </div>
        <div id="world-info">
            <div id="world-location">Loading...</div>
            <div id="world-detail"></div>
        </div>
        <div id="player-count">Online: 1</div>
    </div>
    <script type="module">
        import { ctx } from './GameContext.js';
        import { Car } from './Car.js';
        import { SPEED_TO_KMH } from './CarConstants.js';
        import { createTrack } from './TrackData.js';
        import { createRoadSurface, createCurbstones, createRoadPillars } from './RoadBuilder.js';
        import { placeEnvironmentObjects } from './EnvironmentBuilder.js';
        import { RenderCache, WeatherSystem, initWeatherSystem, setupWeatherButtons, updateWeatherButtonState } from './WeatherSystem.js';
        import { updateDayNightCycle } from './DayNightCycle.js';
        import { updateCamera, setupViewButtons, updateButtonActiveState } from './CameraSystem.js';
        import { RealtimeState, toggleTimeMode } from './TimeModeStates.js';
        import { CarModelLoader } from './CarModelLoader.js';
        import { FirebaseSync, TEST_MODE, WORLD_CITIES, getRandomCity, getCityLocalTime, getCityGameTime } from './FirebaseSync.js';
        import { PlayerCarManager } from './GhostCar.js';

        function log(message) {
            console.log(`[${new Date().toISOString()}] ${message}`);
        }

        log("スクリプト開始（マルチプレイヤー版）");

        // === テストモード: 同期的に（async外で）都市を割り当て & 関数を差し替え ===
        // これにより initWeatherSystem → fetchCurrentWeather が走る前に差し替えが完了する
        let _assignedTestCity = null;
        if (TEST_MODE) {
            _assignedTestCity = getRandomCity();
            log(`[TestMode] 割り当て都市: ${_assignedTestCity.name}`);
        }

        // === 基本設定 ===
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isMobile) {
            renderer.setPixelRatio(0.8);
        }
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x646464);
        document.body.appendChild(renderer.domElement);

        ctx.scene = scene;
        ctx.camera = camera;
        ctx.renderer = renderer;
        ctx.updateButtonActiveState = updateButtonActiveState;

        // テストモード: 位置・時刻・地名の取得関数を差し替え（同期的に、initWeatherSystemより先に）
        if (TEST_MODE && _assignedTestCity) {
            ctx._testCity = _assignedTestCity;

            // 位置取得 → テスト都市の座標を返す
            ctx._getLocation = () => ({
                lat: _assignedTestCity.lat,
                lon: _assignedTestCity.lon,
            });

            // 地名取得 → テスト都市名を返す
            ctx._getLocationName = (_apiName) => _assignedTestCity.name;

            // 国コード → テスト都市の国コードを返す
            ctx.currentCountryCode = _assignedTestCity.country || '';

            // 現在時刻取得 → テスト都市のローカル時刻を返す
            ctx._getCurrentGameTime = () => getCityGameTime(_assignedTestCity);

            ctx.currentLocationName = _assignedTestCity.name;
        }


        const HORIZONTAL_SCALE = ctx.HORIZONTAL_SCALE;

        // === トラック生成 ===
        const { carPath, detailedPathPoints } = createTrack();
        ctx.carPath = carPath;
        ctx.detailedPathPoints = detailedPathPoints;

        const roadGroup = new THREE.Group();
        scene.add(roadGroup);
        ctx.roadGroup = roadGroup;

        // === Firebase & プレイヤー車管理 ===
        const firebaseSync = new FirebaseSync();
        let playerCarManager = null;
        let lastFocusedIndex = -1; // 前回フォーカスしていた車のインデックス

        // === 自分の世界情報をFirebaseに書き込み ===
        function syncMyWorldToFirebase() {
            firebaseSync.updateMyWorld({
                weather: ctx.weatherSystem.current || 'sunny',
                temperature: ctx.currentTemperature || 20,
                humidity: ctx.currentHumidity || 50,
                windSpeed: ctx.currentWindSpeed || 0,
                pressure: ctx.currentPressure || 1013,
                locationName: ctx.currentLocationName || '',
                countryCode: ctx.currentCountryCode || '',
                lat: ctx.currentLat || 0,
                lon: ctx.currentLon || 0,
            });
        }

        // === 世界情報のフォーマット ===
        // 国コード → 国旗絵文字変換（例: 'JP' → '🇯🇵'）
        function countryCodeToFlag(code) {
            if (!code || code.length !== 2) return '';
            return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
        }
        // 都市名 + 国旗 + 時刻（1行目用）
        function formatWorldTitle(name, data) {
            const flag = countryCodeToFlag(data.countryCode);
            let title = flag ? `${flag} ${name || ''}` : (name || '');
            if (data.localTime) title += `  ${data.localTime}`;
            return title;
        }
        // 天気情報（2行目用）
        function formatWorldWeather(data) {
            const weatherMap = { sunny: '☀️', cloudy: '☁️', rain: '🌧️', snow: '❄️' };
            const parts = [];
            if (data.weather) parts.push(weatherMap[data.weather] || data.weather);
            if (data.temperature != null) parts.push(`${Math.round(data.temperature)}℃`);
            if (data.humidity != null) parts.push(`💧${data.humidity}%`);
            if (data.windSpeed != null) parts.push(`${Math.round(data.windSpeed)}m/s`);
            if (data.pressure != null) parts.push(`${data.pressure}hPa`);
            return parts.join('  ');
        }

        // === 世界切替：フォーカスした車のプレイヤーの世界に切り替える ===
        function switchWorld(carIndex) {
            if (!playerCarManager) return;
            if (carIndex === lastFocusedIndex) return;
            lastFocusedIndex = carIndex;

            const playerInfo = playerCarManager.getFocusedPlayerWorld(carIndex);
            const infoEl = document.getElementById('world-info');
            const locationEl = document.getElementById('world-location');
            const detailEl = document.getElementById('world-detail');

            if (!playerInfo || playerInfo.isLocal) {
                infoEl.classList.remove('remote');
                updateLocalWorldDisplay();
                restoreLocalWorld();
            } else {
                infoEl.classList.add('remote');
                const name = playerInfo.locationName || playerInfo.location || 'Unknown';
                locationEl.textContent = formatWorldTitle(name, playerInfo);
                detailEl.textContent = formatWorldWeather(playerInfo);
                applyRemoteWorld(playerInfo);
            }
        }

        // 自分のローカル天気情報を表示に反映
        function updateLocalWorldDisplay() {
            const locationEl = document.getElementById('world-location');
            const detailEl = document.getElementById('world-detail');
            let localTime;
            const testCity = firebaseSync.getTestCity?.();
            if (TEST_MODE && testCity) {
                localTime = getCityLocalTime(testCity);
            } else {
                const now = new Date();
                localTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            }
            const name = ctx.currentLocationName || 'Your Location';
            const data = {
                localTime,
                countryCode: ctx.currentCountryCode || '',
                weather: ctx.weatherSystem.current,
                temperature: ctx.currentTemperature,
                humidity: ctx.currentHumidity,
                windSpeed: ctx.currentWindSpeed,
                pressure: ctx.currentPressure,
            };
            locationEl.textContent = formatWorldTitle(name, data);
            detailEl.textContent = formatWorldWeather(data);
        }

        // 他プレイヤーの世界を適用
        function applyRemoteWorld(worldData) {
            // 天気を変更
            if (worldData.weather && ctx.weatherSystem) {
                ctx.weatherSystem.change(worldData.weather, false, worldData.temperature, worldData.windSpeed);
            }

            // 時刻を変更（タイムゾーンオフセットから計算）
            if (worldData.timeOffset != null) {
                const localOffset = new Date().getTimezoneOffset();
                const diffMinutes = localOffset - worldData.timeOffset;
                const now = new Date();
                const remoteTime = new Date(now.getTime() + diffMinutes * 60000);
                const remoteHour = remoteTime.getHours() + remoteTime.getMinutes() / 60;
                ctx.gameTime = remoteHour;
                // 時間モードを一時的に固定時間に
                ctx._remoteWorldActive = true;
                ctx._remoteGameTime = remoteHour;
            }
        }

        // 自分の世界に戻す
        function restoreLocalWorld() {
            ctx._remoteWorldActive = false;
            ctx._remoteGameTime = null;
            // 天気を自分のものに戻す
            if (ctx._myWeather) {
                ctx.weatherSystem.change(ctx._myWeather, true, ctx.currentTemperature, ctx.currentWindSpeed);
            }
        }

        // === 光源 ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        ctx.ambientLight = ambientLight;

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);
        ctx.directionalLight = directionalLight;

        // === 地面 ===
        const floorSize = 5000;
        const floorGeometry = new THREE.PlaneGeometry(floorSize, floorSize);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x336633,
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -5;
        scene.add(floor);
        ctx.floor = floor;

        // === レンダリングキャッシュ・天気システム ===
        const renderCache = new RenderCache();
        ctx.renderCache = renderCache;

        const weatherSystem = new WeatherSystem(scene);
        ctx.weatherSystem = weatherSystem;

        // === 時間モード ===
        ctx.timeModeState = new RealtimeState();
        ctx.lastCameraChangeTime = Date.now();
        ctx.lastCarChangeTime = Date.now();
        ctx.currentFrameTime = Date.now();

        // === 道路の可視化 ===
        createRoadSurface();
        createRoadPillars();
        createCurbstones();
        log("道路の作成完了");

        // === OBJモデルのプリロード & 初期化 ===
        (async () => {
            try {
                await CarModelLoader.preload();
                log("OBJモデルのプリロード完了");
            } catch(e) {
                console.warn("OBJモデルロード失敗、プロシージャルにフォールバック:", e);
            }

            // プレイヤー車マネージャー初期化
            playerCarManager = new PlayerCarManager(carPath, scene, ctx.cars);

            // Firebase初期化（テストモードでは既に選ばれた都市を渡す）
            if (TEST_MODE && _assignedTestCity) {
                firebaseSync.testCity = _assignedTestCity;
            }

            firebaseSync.init();
            playerCarManager.setLocalSessionId(firebaseSync.getMySessionId());

            // 自分の車を追加
            const testCity = firebaseSync.getTestCity();
            const myName = testCity ? testCity.name : 'YOU';
            playerCarManager.addPlayerCar(firebaseSync.getMySessionId(), {
                name: myName,
                locationName: testCity ? testCity.name : '',
                lat: testCity ? testCity.lat : null,
                lon: testCity ? testCity.lon : null,
            });
            ctx.currentCarIndex = playerCarManager.getLocalCarIndex();
            lastFocusedIndex = ctx.currentCarIndex;


            // テストモード: パネル表示を更新
            if (TEST_MODE && testCity) {
                document.getElementById('world-location').textContent = testCity.name;
            }

            // 他プレイヤーの参加 → 車を1台追加
            firebaseSync.onPlayerJoin((id, data) => {
                playerCarManager.addPlayerCar(id, data);
                updatePlayerCount();
            });

            // 自分のDB更新をリアルタイムに反映（位置・天気等）
            firebaseSync.onSelfUpdate((id, data) => {
                playerCarManager.updatePlayerWorld(id, data);
                if (data.locationName) ctx.currentLocationName = data.locationName;
                if (!ctx._remoteWorldActive) {
                    updateLocalWorldDisplay();
                }
            });

            // 他プレイヤーの世界情報更新（リアルタイム配信）
            firebaseSync.onWorldUpdate((id, data) => {
                playerCarManager.updatePlayerWorld(id, data);
    
                // 現在そのプレイヤーにフォーカスしていたら世界＆表示をリアルタイム更新
                const focused = playerCarManager.getFocusedPlayerWorld(ctx.currentCarIndex);
                if (focused && focused.sessionId === id) {
                    applyRemoteWorld(data);
                    // パネル表示も更新
                    const locationEl = document.getElementById('world-location');
                    const detailEl = document.getElementById('world-detail');
                    const name = data.locationName || data.location || 'Unknown';
                    locationEl.textContent = formatWorldTitle(name, data);
                    detailEl.textContent = formatWorldWeather(data);
                }
            });

            // 他プレイヤーの離脱 → 車を削除
            firebaseSync.onPlayerLeave((id) => {
                // フォーカスが削除される車だったら自分に戻す
                const removingIdx = playerCarManager.getCarIndex(id);
                if (ctx.currentCarIndex === removingIdx) {
                    ctx.currentCarIndex = playerCarManager.getLocalCarIndex();
                    switchWorld(ctx.currentCarIndex);
                } else if (ctx.currentCarIndex > removingIdx && removingIdx >= 0) {
                    ctx.currentCarIndex--;
                }
                playerCarManager.removePlayerCar(id);
                updatePlayerCount();
            });

            // 定期的に自分の世界情報をDBに同期（3秒ごと）
            // fetchCurrentWeather完了前でも安全（デフォルト値0が送られる）
            // 完了後は実際の値が送られ、child_changedで全クライアントに配信
            setInterval(() => {
                syncMyWorldToFirebase();
            }, 3000);

            log("Firebase接続完了、マルチプレイヤー開始");
        })();

        // === カメラ初期位置 ===
        camera.position.set(100, 70, 90);

        // === プレイヤー数表示更新 ===
        function updatePlayerCount() {
            const count = ctx.cars.length;
            document.getElementById('player-count').textContent = `Online: ${count}`;

        }


        // === 世界地図 ===
        // 簡易大陸アウトライン（[lon, lat] ペアの配列群）
        const CONTINENTS = [
            // North America (mainland)
            [[-168,72],[-145,70],[-140,60],[-130,55],[-125,50],[-124,40],[-117,33],[-110,32],[-105,30],[-100,28],[-97,26],[-90,29],[-85,30],[-82,25],[-80,25],[-81,31],[-75,35],[-70,41],[-67,45],[-66,48],[-60,47],[-65,52],[-58,50],[-55,52],[-60,54],[-65,60],[-75,62],[-80,64],[-85,68],[-95,72],[-110,72],[-125,72],[-140,70],[-168,72]],
            // Central America
            [[-105,25],[-100,20],[-95,18],[-90,16],[-85,14],[-83,10],[-80,8],[-78,8],[-82,10],[-85,12],[-88,16],[-92,18],[-97,20],[-100,22],[-105,25]],
            // South America

        function drawWorldMap() {
            const canvas = document.getElementById('worldmap');
            const mCtx = canvas.getContext('2d');
            const W = canvas.width;
            const H = canvas.height;

            // 座標変換: lon(-180~180) → x(0~W), lat(-90~90) → y(H~0)
            const lonToX = (lon) => (lon + 180) / 360 * W;
            const latToY = (lat) => (90 - lat) / 180 * H;

            // 背景
            mCtx.clearRect(0, 0, W, H);
            mCtx.fillStyle = 'rgba(10, 25, 50, 0.9)';
            mCtx.fillRect(0, 0, W, H);

            // グリッド線
            mCtx.strokeStyle = 'rgba(60, 80, 120, 0.3)';
            mCtx.lineWidth = 0.5;
            for (let lon = -180; lon <= 180; lon += 60) {
                mCtx.beginPath();
                mCtx.moveTo(lonToX(lon), 0);
                mCtx.lineTo(lonToX(lon), H);
                mCtx.stroke();
            }
            for (let lat = -60; lat <= 60; lat += 30) {
                mCtx.beginPath();
                mCtx.moveTo(0, latToY(lat));
                mCtx.lineTo(W, latToY(lat));
                mCtx.stroke();
            }

            // 大陸描画
            mCtx.strokeStyle = 'rgba(100, 140, 180, 0.5)';
            mCtx.fillStyle = 'rgba(60, 90, 120, 0.3)';
            mCtx.lineWidth = 0.8;
            for (const continent of CONTINENTS) {
                mCtx.beginPath();
                for (let i = 0; i < continent.length; i++) {
                    const x = lonToX(continent[i][0]);
                    const y = latToY(continent[i][1]);
                    if (i === 0) mCtx.moveTo(x, y); else mCtx.lineTo(x, y);
                }
                mCtx.closePath();
                mCtx.fill();
                mCtx.stroke();
            }

            // プレイヤーのピン描画（自分も他人も同じデータソース: worldData）
            if (!playerCarManager) return;
            const myId = firebaseSync.getMySessionId();
            const pins = [];

            // 呼吸パラメータ（全ピン共通）
            const t = Date.now() / 1000;
            const breathe = 0.5 + 0.5 * Math.sin(t * 2.0);

            for (const [sessionId, entry] of playerCarManager.playerCars) {
                const lat = entry.worldData?.lat;
                const lon = entry.worldData?.lon;
                if (!lat && !lon) continue; // 0,0 は未取得

                const isLocal = sessionId === myId;
                const carIdx = playerCarManager.getCarIndex(sessionId);
                const isFocused = carIdx === ctx.currentCarIndex;
                const x = lonToX(lon);
                const y = latToY(lat);

                // ピン本体色（自分=金、他人=青）
                const color = isLocal
                    ? (isFocused ? '#ffd700' : '#cc9900')
                    : (isFocused ? '#66aaff' : '#4488cc');

                // グローオーラ（radialGradient + shadowBlur）
                const glowR = isFocused ? 18 : 10;
                const grad = mCtx.createRadialGradient(x, y, 0, x, y, glowR);
                const glowAlpha = (isFocused ? 0.8 : 0.5) * breathe;
                if (isLocal) {
                    grad.addColorStop(0, `rgba(255,215,0,${glowAlpha})`);
                    grad.addColorStop(0.3, `rgba(255,180,0,${glowAlpha * 0.6})`);
                    grad.addColorStop(0.6, `rgba(255,150,0,${glowAlpha * 0.2})`);
                    grad.addColorStop(1, 'rgba(255,215,0,0)');
                } else {
                    grad.addColorStop(0, `rgba(100,170,255,${glowAlpha})`);
                    grad.addColorStop(0.3, `rgba(60,120,255,${glowAlpha * 0.6})`);
                    grad.addColorStop(0.6, `rgba(40,80,255,${glowAlpha * 0.2})`);
                    grad.addColorStop(1, 'rgba(100,170,255,0)');
                }
                mCtx.beginPath();
                mCtx.arc(x, y, glowR, 0, Math.PI * 2);
                mCtx.fillStyle = grad;
                mCtx.fill();

                // ピン本体（shadowBlurで発光感を追加）
                mCtx.save();
                mCtx.shadowColor = isLocal ? 'rgba(255,215,0,0.9)' : 'rgba(100,170,255,0.9)';
                mCtx.shadowBlur = (isFocused ? 12 : 6) * breathe;
                mCtx.beginPath();
                mCtx.arc(x, y, isFocused ? 4 : 3, 0, Math.PI * 2);
                mCtx.fillStyle = color;
                mCtx.fill();
                mCtx.restore();
                mCtx.beginPath();
                mCtx.arc(x, y, isFocused ? 4 : 3, 0, Math.PI * 2);
                mCtx.fillStyle = color;
                mCtx.fill();
                mCtx.strokeStyle = 'white';
                mCtx.lineWidth = isFocused ? 1.5 : 0.8;
                mCtx.stroke();

                // ダブル波紋（フォーカス時）
                if (isFocused) {
                    for (let ring = 0; ring < 2; ring++) {
                        const phase = ((Date.now() + ring * 1000) % 2000) / 2000;
                        mCtx.beginPath();
                        mCtx.arc(x, y, 4 + phase * 10, 0, Math.PI * 2);
                        mCtx.strokeStyle = `rgba(255,255,255,${0.3 * (1 - phase)})`;
                        mCtx.lineWidth = 1.2 - phase * 0.8;
                        mCtx.stroke();
                    }
                }

                pins.push({ x, y, carIdx, sessionId });
            }
            canvas._pins = pins;
        }

        // 世界地図クリック → 最寄りのピンの車に切替
        document.getElementById('worldmap').addEventListener('click', (e) => {
            const canvas = e.target;
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (!canvas._pins) return;
            let nearest = null;
            let nearestDist = Infinity;
            for (const pin of canvas._pins) {
                const d = Math.sqrt((pin.x - mx) ** 2 + (pin.y - my) ** 2);
                if (d < nearestDist) {
                    nearestDist = d;
                    nearest = pin;
                }
            }
            if (nearest && nearestDist < 15) {
                ctx.currentCarIndex = nearest.carIdx;
            }
        });

        // === ミニマップ ===
        function _buildMinimapCache() {
            const canvas = document.getElementById('minimap');
            const margin = 10;
            const pathPoints = [];
            for (let i = 0; i <= 100; i++) {
                pathPoints.push(carPath.getPointAt(i / 100));
            }
            let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
            for (const p of pathPoints) {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
            }
            const width = canvas.width - margin * 2;
            const height = canvas.height - margin * 2;
            const scale = Math.min(width / (maxX - minX), height / (maxZ - minZ));
            const path2d = new Path2D();
            for (let i = 0; i < pathPoints.length; i++) {
                const x = margin + (pathPoints[i].x - minX) * scale;
                const z = margin + (pathPoints[i].z - minZ) * scale;
                if (i === 0) path2d.moveTo(x, z); else path2d.lineTo(x, z);
            }
            path2d.closePath();
            renderCache.minimap = { margin, minX, minZ, scale, path2d };
        }

        function updateMinimap() {
            const canvas = document.getElementById('minimap');
            const mmCtx = canvas.getContext('2d');
            if (!renderCache.minimap) _buildMinimapCache();
            const { margin, minX, minZ, scale, path2d } = renderCache.minimap;

            mmCtx.clearRect(0, 0, canvas.width, canvas.height);
            mmCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            mmCtx.fillRect(0, 0, canvas.width, canvas.height);
            mmCtx.strokeStyle = 'white';
            mmCtx.lineWidth = 1;
            mmCtx.stroke(path2d);

            for (let i = 0; i < ctx.cars.length; i++) {
                const car = ctx.cars[i];
                if (!car.object) continue;
                const pos = car.object.position;
                const x = margin + (pos.x - minX) * scale;
                const y = margin + (pos.z - minZ) * scale;
                const dir = car._frameFwd;
                const angle = Math.atan2(dir.z, dir.x) + Math.PI/2;

                let carColor = 'white';
                let markerScale = 1.0;
                if (i === ctx.currentCarIndex) {
                    carColor = '#ffd700';
                    markerScale = 1.4;
                }

                mmCtx.save();
                mmCtx.translate(x, y);
                mmCtx.rotate(angle);
                mmCtx.scale(markerScale, markerScale);
                mmCtx.beginPath();
                mmCtx.moveTo(0, -5);
                mmCtx.lineTo(-3, 3);
                mmCtx.lineTo(3, 3);
                mmCtx.closePath();
                mmCtx.fillStyle = carColor;
                mmCtx.fill();
                mmCtx.restore();
            }
        }

        // === アニメーションループ ===
        let frameCount = 0;
        let lastFrameTime = Date.now();

        function animate() {
            requestAnimationFrame(animate);

            ctx.currentFrameTime = Date.now();
            const deltaTime = (ctx.currentFrameTime - lastFrameTime) / 16.67;
            lastFrameTime = ctx.currentFrameTime;

            // リモートの世界が有効なら、gameTimeを固定
            if (ctx._remoteWorldActive && ctx._remoteGameTime != null) {
                // リモートの時刻を毎フレーム再計算（リアルタイムで進行）
                const focused = playerCarManager?.getFocusedPlayerWorld(ctx.currentCarIndex);
                if (focused && !focused.isLocal && focused.timeOffset != null) {
                    const localOffset = new Date().getTimezoneOffset();
                    const diffMinutes = localOffset - focused.timeOffset;
                    const now = new Date();
                    const remoteTime = new Date(now.getTime() + diffMinutes * 60000);
                    ctx.gameTime = remoteTime.getHours() + remoteTime.getMinutes() / 60;
                }
            }

            updateDayNightCycle();
            weatherSystem.update(deltaTime, camera);

            // 車の更新
            for (let i = 0; i < ctx.cars.length; i++) {
                ctx.cars[i].update(deltaTime);
            }

            // 世界切替チェック
            switchWorld(ctx.currentCarIndex);

            // 自分の世界パネルを定期更新（時刻が進むため、60フレームごと）
            if (frameCount % 60 === 0 && !ctx._remoteWorldActive) {
                updateLocalWorldDisplay();
            }

            // 世界地図を更新（波紋アニメのため10フレームごと）
            if (frameCount % 10 === 0) drawWorldMap();

            // 速度表示の更新
            const currentCar = ctx.cars[ctx.currentCarIndex];
            if (currentCar) {
                const speedKmh = Math.round(currentCar.speed * HORIZONTAL_SCALE * 3.6);
                document.getElementById('speed-display').textContent = `${speedKmh} km/h`;
            }

            updateCamera();
            if (frameCount % 3 === 0) updateMinimap();
            renderer.render(scene, camera);
            frameCount++;
        }

        // === リサイズ処理 ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === キーボード操作 ===
        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'Tab':
                    event.preventDefault();
                    ctx.currentCarIndex = (ctx.currentCarIndex + 1) % ctx.cars.length;
                    break;
                case '1': ctx.cameraMode = 0; updateButtonActiveState(); break;
                case '2': ctx.cameraMode = 1; updateButtonActiveState(); break;
                case '3': ctx.cameraMode = 2; updateButtonActiveState(); break;
                case '4': ctx.cameraMode = 3; updateButtonActiveState(); break;
                case '5': ctx.cameraMode = 4; updateButtonActiveState(); break;
                case 'd':
                case 'D':
                    ctx.debugMode = !ctx.debugMode;
                    if (!ctx.debugMode) {
                        for (const car of ctx.cars) {
                            if (car._debugLabel) car._debugLabel.visible = false;
                        }
                    }
                    break;
            }
        });

        // === 時間モード切替ボタン ===
        document.getElementById('timeToggleButton').addEventListener('click', function() {
            toggleTimeMode();
        });


        // === 初期化関数 ===
        function init() {
            placeEnvironmentObjects();
            setupViewButtons();
            setupWeatherButtons();
            updateWeatherButtonState(weatherSystem.current);

            document.getElementById('minimap-container').addEventListener('click', () => {
                ctx.currentCarIndex = (ctx.currentCarIndex + 1) % ctx.cars.length;
            });

            log("アニメーション開始");
            animate();
            initWeatherSystem();
        }

        // 離脱時にFirebase切断
        window.addEventListener('beforeunload', () => {
            firebaseSync.destroy();
        });

        document.getElementById('welcome-start').addEventListener('click', () => {
            const overlay = document.getElementById('welcome-overlay');
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.5s';
            setTimeout(() => overlay.remove(), 500);
        });

        window.onload = init;
    </script>
