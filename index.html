        // コース全周の連続地形メッシュを作成（リッジレーサー風）
        function createRockFormations() {
            const terrainGroup = new THREE.Group();
            scene.add(terrainGroup);

            // シード付き乱数
            function seededRandom(seed) {
                const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
                return x - Math.floor(x);
            }

            // シンプルなノイズ関数（2Dバリューノイズ）
            function noise2D(x, z) {
                const ix = Math.floor(x);
                const iz = Math.floor(z);
                const fx = x - ix;
                const fz = z - iz;
                // スムーズステップ補間
                const ux = fx * fx * (3 - 2 * fx);
                const uz = fz * fz * (3 - 2 * fz);
                // 4隅の値
                const a = seededRandom(ix * 73.7 + iz * 157.3);
                const b = seededRandom((ix + 1) * 73.7 + iz * 157.3);
                const c = seededRandom(ix * 73.7 + (iz + 1) * 157.3);
                const d = seededRandom((ix + 1) * 73.7 + (iz + 1) * 157.3);
                return a + (b - a) * ux + (c - a) * uz + (a - b - c + d) * ux * uz;
            }

            // フラクタルノイズ（オクターブ重ね）
            function fractalNoise(x, z, octaves, persistence, scale) {
                let total = 0;
                let amplitude = 1;
                let frequency = scale;
                let maxVal = 0;
                for (let i = 0; i < octaves; i++) {
                    total += noise2D(x * frequency, z * frequency) * amplitude;
                    maxVal += amplitude;
                    amplitude *= persistence;
                    frequency *= 2;
                }
                return total / maxVal;
            }

            // コース沿いの地形帯（strips）を両サイドに生成
            // 各帯: 道路端→外側に広がる複数リングの頂点
            const pathSegments = 200; // コース周方向の分割数
            const radialSteps = 6;   // 道路端から外側への帯数
            const radialDistances = [0, 5, 15, 30, 55, 90]; // 道路端からの距離
            const baseHeights =      [0, 2, 8, 18, 30, 40]; // 各帯の基本的な高さ上昇

            function createSideTerrain(side) {
                const vertices = [];
                const indices = [];
                const colors = [];

                // 頂点を生成
                for (let i = 0; i <= pathSegments; i++) {
                    const t = (i / pathSegments) % 1;
                    const point = carPath.getPointAt(t);
                    const tangent = carPath.getTangentAt(t);
                    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();

                    for (let r = 0; r < radialSteps; r++) {
                        const dist = roadWidth / 2 + 1.2 + radialDistances[r]; // ガードレール外側から
                        const pos = new THREE.Vector3().addVectors(
                            point,
                            normal.clone().multiplyScalar(side * dist)
                        );

                        // 高さの計算
                        let h = point.y;
                        if (r === 0) {
                            // 道路端: 道路面とほぼ同じ高さ（少し下）
                            h = point.y - 0.5;
                        } else {
                            // ノイズで自然な起伏を生成
                            const nx = pos.x * 0.008;
                            const nz = pos.z * 0.008;
                            const noiseVal = fractalNoise(nx, nz, 3, 0.5, 1.0);
                            // 基本高さ + ノイズによる変動
                            h = point.y - 2 + baseHeights[r] * (0.5 + noiseVal * 1.0);

                            // 高架部分は地形を下げない（柱が地面から出るように）
                            if (point.y > 3 && r >= 2) {
                                h = Math.min(h, point.y * 0.3);
                            }
                        }

                        vertices.push(pos.x, h, pos.z);

                        // 頂点カラー（高さに応じて岩色を変化）
                        const heightRatio = Math.min(1, Math.max(0, (h - point.y) / 35));
                        const baseColor = new THREE.Color(0x6B5B4F); // 茶褐色
                        const peakColor = new THREE.Color(0x8B7D6B); // 砂岩色
                        const darkColor = new THREE.Color(0x4A3F35); // 暗い岩色
                        const noiseColor = fractalNoise(pos.x * 0.02, pos.z * 0.02, 2, 0.5, 1.0);

                        const color = baseColor.clone().lerp(peakColor, heightRatio);
                        // ノイズで色に変化をつける
                        color.lerp(darkColor, noiseColor * 0.3);
                        colors.push(color.r, color.g, color.b);
                    }
                }

                // インデックス生成（帯をつなぐ三角形）
                for (let i = 0; i < pathSegments; i++) {
                    for (let r = 0; r < radialSteps - 1; r++) {
                        const v0 = i * radialSteps + r;
                        const v1 = v0 + 1;
                        const v2 = v0 + radialSteps;
                        const v3 = v2 + 1;

                        if (side > 0) {
                            indices.push(v0, v2, v1);
                            indices.push(v1, v2, v3);
                        } else {
                            indices.push(v0, v1, v2);
                            indices.push(v1, v3, v2);
                        }
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                geometry.setIndex(indices);
                geometry.computeVertexNormals();

                const material = new THREE.MeshLambertMaterial({
                    vertexColors: true,
                    flatShading: true,
                    side: THREE.DoubleSide,
                });

                terrainGroup.add(new THREE.Mesh(geometry, material));
            }

            // 両サイドに地形を生成
            createSideTerrain(1);  // 右側
            createSideTerrain(-1); // 左側

            log("連続地形の生成完了");
        }
        
        // 街灯を作成する関数
        function createStreetlights() {
            // 街灯の間隔（パスの割合）
            const streetlightSpacing = 0.04; // コース全体で約25本の街灯
            
            // 街灯用のグループを作成
            const streetlightGroup = new THREE.Group();
            roadGroup.add(streetlightGroup);
            
            // コース全体に街灯を配置
            let currentT = 0;
            while (currentT < 1) {
                // パス上の位置と接線を取得
                const point = carPath.getPointAt(currentT);
                const tangent = carPath.getTangentAt(currentT);
                
                // 垂直方向ベクトル（外側方向）
                const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                
                // 道路の右側に街灯を設置
                createSingleStreetlight(point, normal, 1); // 右側
                
                currentT += streetlightSpacing;
            }
            
            // 1本の街灯を作成する関数
            function createSingleStreetlight(point, normal, side) {
                // 街灯の位置（道路の外側）
                const lightPosition = new THREE.Vector3().addVectors(
                    point,
                    normal.clone().multiplyScalar(side * (roadWidth / 2 + 2.0))
                );
                
                // 街灯の支柱
                const poleGeometry = new THREE.CylinderGeometry(0.15, 0.2, 8, 8);
                const poleMaterial = new THREE.MeshLambertMaterial({ color: 0x888888 });
                const pole = new THREE.Mesh(poleGeometry, poleMaterial);
                
                // 支柱の位置を設定
                pole.position.copy(new THREE.Vector3(
                    lightPosition.x,
                    point.y + 4, // 地面からの高さ
                    lightPosition.z
                ));
                
                // 支柱を垂直に立てる
                pole.rotation.x = Math.PI / 2;
                
                streetlightGroup.add(pole);
                
                // 街灯の頭部
                const headGeometry = new THREE.BoxGeometry(1.0, 0.4, 0.4);
                const headMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x333333,
                    emissive: 0xFFDD99,
                    emissiveIntensity: 0.1 // 初期値は低く
                });
                const head = new THREE.Mesh(headGeometry, headMaterial);
                
                // 頭部の位置を設定
                head.position.copy(new THREE.Vector3(
                    lightPosition.x,
                    point.y + 8, // 支柱の上部
                    lightPosition.z
                ));
                
                // 頭部を道路に向ける
                head.lookAt(new THREE.Vector3(
                    point.x,
                    point.y + 8,
                    point.z
                ));
                
                // ユーザーデータに街灯フラグを設定
                head.userData.isStreetlight = true;
                
                streetlightGroup.add(head);
                
                // 街灯のライト
                const light = new THREE.PointLight(0xFFDD99, 0.2, 10, 2);
                light.position.copy(new THREE.Vector3(
                    lightPosition.x,
                    point.y + 8, // 支柱の上部
                    lightPosition.z
                ));
                
                // ライトを街灯の頭部に関連付ける
                head.userData.pointLight = light;
                
                streetlightGroup.add(light);
            }
        }
        
        // カメラモード（0: 俯瞰, 1: 追従, 2: 車載, 3: 斜め視点）
        let cameraMode = 3; // デフォルトを斜め視点モードに設定
        let debugMode = false; // デバッグ表示（Dキーで切り替え）
        
        // カメラ位置の初期設定（斜め視点向け）
        camera.position.set(100, 70, 90); // 斜め視点の初期位置
        
        // 過去フレームの時間を記録する変数
        let lastFrameTime = Date.now();
        
        // デバッグラベル描画: 状態文字・ライン戦略・速度・スリップストリームバーを描画
        function drawDebugInfo(ctx, car, textY, barY) {
            const strategyLabels = { OUT_IN_OUT: 'OIO', LATE_APEX: 'LA', IN_IN_IN: 'III', WIDE_ENTRY: 'WE' };
            const strategyColors = { OUT_IN_OUT: '#44aaff', LATE_APEX: '#ffaa00', IN_IN_IN: '#ff4488', WIDE_ENTRY: '#aa44ff' };

            let stateChar = 'N';
            let stateColor = '#888888';
            if (car.isOvertaking && !car.isReturning) { stateChar = 'P'; stateColor = '#ff8800'; }
            else if (car.isReturning) { stateChar = 'R'; stateColor = '#88aaff'; }
            else if (car.isTandemFollowing) { stateChar = 'T'; stateColor = '#00ff88'; }

            const strat = car.drivingStyle?.lineStrategy || '';
            const kmh = Math.round(car.speed * Car.SPEED_TO_KMH);
            const infoText = stateChar + ' ' + (strategyLabels[strat] || '') + ' ' + kmh;

            ctx.font = 'bold 18px sans-serif';
            const totalW = ctx.measureText(infoText).width;
            let cx = 128 - totalW / 2;
            ctx.textAlign = 'left';
            ctx.fillStyle = stateColor;
            ctx.fillText(stateChar, cx, textY);
            cx += ctx.measureText(stateChar + ' ').width;
            ctx.fillStyle = strategyColors[strat] || '#888888';
            const stratLabel = strategyLabels[strat] || '';
            ctx.fillText(stratLabel, cx, textY);
            cx += ctx.measureText(stratLabel + ' ').width;
            ctx.fillStyle = '#cccccc';
            ctx.fillText('' + kmh, cx, textY);
            ctx.textAlign = 'center';

            // スリップストリームバー
            const slip = car.slipstreamCharge;
            if (slip > 0) {
                const barX = 60, barW = 136, barH = 8;
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(barX, barY, barW, barH);
                const r = Math.floor(255 * slip);
                const g = Math.floor(255 * (1 - slip * 0.5));
                ctx.fillStyle = `rgb(${r},${g},0)`;
                ctx.fillRect(barX, barY, barW * slip, barH);
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(barX, barY, barW, barH);
            }
        }

        // アニメーションループ
        let frameCount = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const metrics = {};
            const startTime = performance.now();
            let lastCheck = startTime;
            
            // フレーム間のデルタタイムを計算
            currentFrameTime = Date.now();
            const deltaTime = (currentFrameTime - lastFrameTime) / 16.67;
            lastFrameTime = currentFrameTime;
            
            // 昼夜サイクルの更新
            updateDayNightCycle();
            metrics.dayNightCycle = performance.now() - lastCheck;
            lastCheck = performance.now();
            
            // 天気の更新
            weatherSystem.update(deltaTime, camera);
            metrics.weather = performance.now() - lastCheck;
            lastCheck = performance.now();
            
            // オート・早送りモード時の車の自動切り替え
            if (timeModeState.shouldAutoSwitch() && !raceManager?.active && currentFrameTime - lastCarChangeTime > carChangeInterval) {
                // 現在の車以外からランダムに選択
                const availableCars = Array.from({length: cars.length}, (_, i) => i).filter(i => i !== currentCarIndex);
                currentCarIndex = availableCars[Math.floor(Math.random() * availableCars.length)];
                
                lastCarChangeTime = currentFrameTime;
                carChangeInterval = 20000 + Math.random() * 10000; // 20-30秒のランダムな間隔
            }
            
            // 車の更新
            for (let i = 0; i < cars.length; i++) {
                const car = cars[i];
                car.update(deltaTime);

                // 車の上のラベル表示（レース中: 順位 / 通常: デバッグ）
                if (debugMode || raceManager?.active) {
                    if (!car._debugLabel) {
                        const canvas = document.createElement('canvas');
                        canvas.width = 256;
                        canvas.height = 96;
                        const texture = new THREE.CanvasTexture(canvas);
                        const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
                        const sprite = new THREE.Sprite(material);
                        sprite.scale.set(10, 3.75, 1);
                        scene.add(sprite);
                        car._debugLabel = sprite;
                        car._debugCanvas = canvas;
                        car._debugTexture = texture;
                    }
                    car._debugLabel.visible = true;

                    // デバッグテキストのキーを生成（変化時のみCanvas再描画）
                    let debugKey = '';
                    if (raceManager?.active) {
                        const ranked = raceManager._cachedRanked || [];
                        const rank = ranked.findIndex(([c]) => c === car) + 1;
                        const isPredicted = raceManager.predictedCar === car;
                        const stateChar = car.isOvertaking && !car.isReturning ? 'P' : car.isReturning ? 'R' : car.isTandemFollowing ? 'T' : 'N';
                        const kmh = Math.round(car.speed * Car.SPEED_TO_KMH);
                        const slip = Math.round(car.slipstreamCharge * 10);
                        debugKey = `R${rank}${debugMode?1:0}${stateChar}${kmh}${slip}${isPredicted?1:0}`;
                    } else if (debugMode) {
                        const stateChar = car.isOvertaking && !car.isReturning ? 'P' : car.isReturning ? 'R' : car.isTandemFollowing ? 'T' : 'N';
                        const kmh = Math.round(car.speed * Car.SPEED_TO_KMH);
                        const slip = Math.round(car.slipstreamCharge * 10);
                        debugKey = `D${stateChar}${kmh}${slip}`;
                    }

                    if (debugKey !== car._lastDebugKey) {
                        car._lastDebugKey = debugKey;
                        const ctx = car._debugCanvas.getContext('2d');
                        ctx.clearRect(0, 0, 256, 96);

                        if (raceManager?.active) {
                            const ranked = raceManager._cachedRanked || [];
                            const rank = ranked.findIndex(([c]) => c === car) + 1;
                            const isPredicted = raceManager.predictedCar === car;

                            ctx.font = 'bold 44px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.fillStyle = rank <= 3 ? '#ffdd00' : '#ffffff';
                            ctx.fillText('P' + rank, 128, debugMode ? 36 : 48);

                            if (debugMode) {
                                drawDebugInfo(ctx, car, 56, 62);
                            }

                            if (isPredicted) {
                                ctx.font = 'bold 18px sans-serif';
                                ctx.fillStyle = '#ffdd00';
                                ctx.fillText('\u2605', 128, debugMode ? 82 : 70);
                            }
                        } else if (debugMode) {
                            drawDebugInfo(ctx, car, 36, 42);
                        }
                        car._debugTexture.needsUpdate = true;
                    }
                    car._debugLabel.position.copy(car.object.position);
                    car._debugLabel.position.y += 5;
                }
            }
            // レース更新
            if (raceManager?.active && raceManager.phase === 'racing') {
                raceManager.updateRace();
            }
            if (raceManager?.active) {
                raceManager.updateUI();
            }

            metrics.carUpdates = performance.now() - lastCheck;
            lastCheck = performance.now();

            // 速度表示の更新
            const currentCar = cars[currentCarIndex];
            if (currentCar) {
                const speedKmh = Math.round(currentCar.speed * HORIZONTAL_SCALE * 3.6); // スケールを考慮してm/sからkm/hに変換
                document.getElementById('speed-display').textContent = `${speedKmh} km/h`;
            }
            
            // カメラの更新
            updateCamera();
            metrics.camera = performance.now() - lastCheck;
            lastCheck = performance.now();
            
            // ミニマップの更新
            updateMinimap();
            metrics.minimap = performance.now() - lastCheck;
            lastCheck = performance.now();
            
            // レンダリング
            renderer.render(scene, camera);
            metrics.rendering = performance.now() - lastCheck;
            
            // 全体の実行時間
            metrics.total = performance.now() - startTime;
            
            // 100フレームごとにメトリクスを出力
            frameCount++;
            if (frameCount % 100 === 0) {
                console.log('Frame Performance Metrics:');
                console.table(metrics);
            }
        }
        
        // カメラの位置と向きを更新
        function updateCamera() {
            const currentCar = cars[currentCarIndex];
            if (!currentCar || !currentCar.object) return;

            switch (cameraMode) {
                case 0: // 俯瞰
                    // 車の真上からの追従視点
                    const topOffset = new THREE.Vector3(0, 100, 0); // 高さ100の真上
                    const targetTopCameraPos = new THREE.Vector3().addVectors(currentCar.object.position, topOffset);
                    camera.position.lerp(targetTopCameraPos, 0.1); // スムーズな追従
                    camera.lookAt(currentCar.object.position);
                    
                    // 視野角を広めに設定して見やすく
                    camera.fov = 70;
                    camera.updateProjectionMatrix();
                    break;
                    
                case 1: // 追従
                    // 車の後ろから少し上の位置（Z軸を正に変更して車の後ろに）
                    const followOffset = new THREE.Vector3(0, 5, 10); // 車の真後ろ寄り
                    // 車の向きに合わせてオフセットを回転
                    const rotatedOffset = followOffset.clone().applyQuaternion(currentCar.object.quaternion);
                    
                    // カメラ位置をスムーズに更新
                    const targetCameraPos = new THREE.Vector3().addVectors(currentCar.object.position, rotatedOffset);
                    camera.position.lerp(targetCameraPos, 0.1); // スムージング
                    
                    // カメラの注視点を車の位置に設定（少し前に）
                    const lookAheadOffset = new THREE.Vector3(0, -2, -20).applyQuaternion(currentCar.object.quaternion);
                    const lookAtPoint = new THREE.Vector3().addVectors(currentCar.object.position, lookAheadOffset);
                    camera.lookAt(lookAtPoint);
                    
                    // 標準の視野角に戻す
                    camera.fov = 60;
                    camera.updateProjectionMatrix();
                    break;
                    
                case 2: // 車載（ドライバー視点）
                    // 車体に固定マウント（運転席位置）
                    const fpvOffset = new THREE.Vector3(0, 1.2, 0.0);
                    const rotatedFpvOffset = fpvOffset.clone().applyQuaternion(currentCar.object.quaternion);
                    // 車体に直接固定
                    camera.position.copy(currentCar.object.position).add(rotatedFpvOffset);

                    // 進行方向を見る（注視点も少し遅延）
                    const fpvLookAheadOffset = new THREE.Vector3(0, 0.5, -30).applyQuaternion(currentCar.object.quaternion);
                    const fpvLookAtPoint = new THREE.Vector3().addVectors(currentCar.object.position, fpvLookAheadOffset);
                    if (!camera.userData.fpvLookTarget) camera.userData.fpvLookTarget = fpvLookAtPoint.clone();
                    camera.userData.fpvLookTarget.lerp(fpvLookAtPoint, 0.1);
                    camera.lookAt(camera.userData.fpvLookTarget);

                    camera.fov = 80;
                    camera.updateProjectionMatrix();

                    break;
                case 3: // 斜め上視点
                    // 車の上と横から見る位置（車の傾きを強調して見せるため）
                    const diagonalOffset = new THREE.Vector3(50, 40, 20); // 右上からかなり離れた位置に配置
                    // 車の向きに合わせてオフセットを回転
                    const rotatedDiagOffset = diagonalOffset.clone().applyQuaternion(currentCar.object.quaternion);
                    
                    // カメラ位置をスムーズに更新
                    const targetDiagCameraPos = new THREE.Vector3().addVectors(currentCar.object.position, rotatedDiagOffset);
                    camera.position.lerp(targetDiagCameraPos, 0.1); // スムージング
                    
                    // 車をしっかり見る（少し前を見るように設定）
                    const diagLookOffset = new THREE.Vector3(0, -1, -5).applyQuaternion(currentCar.object.quaternion);
                    const diagLookAtPoint = new THREE.Vector3().addVectors(currentCar.object.position, diagLookOffset);
                    camera.lookAt(diagLookAtPoint);
                    
                    // 標準の視野角に戻す
                    camera.fov = 60;
                    camera.updateProjectionMatrix();
                    break;
                    
                case 4: // 車前方から後方を見る視点
                    // 車の前方の位置（Z軸を負に変更して車の前方に）
                    const frontOffset = new THREE.Vector3(0, 5, -32); // 車の前方、より離れた位置に変更
                    // 車の向きに合わせてオフセットを回転
                    const rotatedFrontOffset = frontOffset.clone().applyQuaternion(currentCar.object.quaternion);
                    
                    // カメラ位置をスムーズに更新
                    const targetFrontCameraPos = new THREE.Vector3().addVectors(currentCar.object.position, rotatedFrontOffset);
                    camera.position.lerp(targetFrontCameraPos, 0.1); // スムージング
                    
                    // カメラが車の後方を見るようにする
                    const lookBackOffset = new THREE.Vector3(0, 0, 20).applyQuaternion(currentCar.object.quaternion);
                    const lookBackPoint = new THREE.Vector3().addVectors(currentCar.object.position, lookBackOffset);
                    camera.lookAt(lookBackPoint);
                    
                    // 標準の視野角に戻す
                    camera.fov = 60;
                    camera.updateProjectionMatrix();
                    break;
            }
        }

        // 天気に応じた環境を適用
        function applyWeatherEnvironment(weather) {
            const params = weatherEnvironmentTable[weather];
            if (!params) return;

            // 霧の設定（カメラモードに応じて濃度を調整、既存fogインスタンスを再利用）
            if (params.fogColor === null) {
                scene.fog = null;
            } else {
                const density = cameraMode === 0 ? params.fogDensityBirdseye : params.fogDensityNormal;
                if (scene.fog) {
                    scene.fog.color.set(params.fogColor);
                    scene.fog.density = density;
                } else {
                    scene.fog = new THREE.FogExp2(params.fogColor, density);
                }
            }

            // 空の色を設定
            renderCache.setWeatherSkyColor(params.skyColor);

            // 床マテリアルの更新
            floor.material.color.setHex(params.floorColor);
            floor.material.roughness = params.floorRoughness;
            floor.material.metalness = params.floorMetalness;
            floor.material.needsUpdate = true;
        }

        // 現在位置の天気を取得する関数
        async function fetchCurrentWeather() {
            try {
                // 現在位置を取得
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        timeout: 10000,
                        maximumAge: 0
                    });
                });
                
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                log(`現在位置を取得しました: 緯度 ${lat}, 経度 ${lon}`);
                
                // OpenWeatherMap APIを呼び出し
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${weatherApiKey}&units=metric`);
                
                if (!response.ok) {
                    throw new Error('天気情報の取得に失敗しました');
                }
                
                const data = await response.json();
                
                // 気象データを取得
                const temperature = data.main.temp;
                const windSpeed = data.wind.speed;
                const humidity = data.main.humidity;
                const pressure = data.main.pressure;
                const locationName = data.name;

                // 気象データを保存
                currentTemperature = temperature;
                currentWindSpeed = windSpeed;
                currentHumidity = humidity;
                currentPressure = pressure;
                currentLocationName = locationName;

                log(`${locationName} 気温: ${temperature}℃, 風速: ${windSpeed}m/s, 湿度: ${humidity}%, 気圧: ${pressure}hPa`);
                
                // 天気コードに基づいて天気を設定
                const weatherCode = data.weather[0].id;
                let gameWeather = 'sunny'; // デフォルト
                
                // 天気コードに基づいて天気を判定
                if (weatherCode >= 600 && weatherCode < 623) {
                    gameWeather = 'snow';
                } else if ((weatherCode >= 500 && weatherCode < 532) || (weatherCode >= 200 && weatherCode < 233)) {
                    gameWeather = 'rain';
                } else if (weatherCode >= 801 && weatherCode < 805) {
                    gameWeather = 'cloudy';
                } else if (weatherCode === 800) {
                    gameWeather = 'sunny';
                } else {
                    gameWeather = 'cloudy';
                }
                
                log(`天気を変更します: ${gameWeather}`);
                
                // 天気を変更（気温と風速も渡す）
                weatherSystem.change(gameWeather, true, temperature, windSpeed);
                
                return gameWeather;
            } catch (error) {
                console.error('天気情報の取得エラー:', error);
                log('天気情報の取得に失敗しました。デフォルトの天気を使用します。');
                
                updateWeatherDisplay('-', false); // エラー時は天気表示を非表示に
                
                // エラーの場合はランダムな天気を設定（表示はしない）
                const randomWeather = weatherSystem.available[Math.floor(Math.random() * weatherSystem.available.length)];
                weatherSystem.change(randomWeather, false);
                
                return null;
            }
        }

        // グローバル変数に気温と風速を追加

        // ミニマップ: パスポイント・Path2D・スケール情報をキャッシュ
        function _buildMinimapCache() {
            const canvas = document.getElementById('minimap');
            const margin = 10;
            const pathPoints = [];
            for (let i = 0; i <= 100; i++) {
                pathPoints.push(carPath.getPointAt(i / 100));
            }
            let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
            for (const p of pathPoints) {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
            }
            const width = canvas.width - margin * 2;
            const height = canvas.height - margin * 2;
            const scale = Math.min(width / (maxX - minX), height / (maxZ - minZ));
            // Path2D をキャッシュ
            const path2d = new Path2D();
            for (let i = 0; i < pathPoints.length; i++) {
                const x = margin + (pathPoints[i].x - minX) * scale;
                const z = margin + (pathPoints[i].z - minZ) * scale;
                if (i === 0) path2d.moveTo(x, z); else path2d.lineTo(x, z);
            }
            path2d.closePath();
            renderCache.minimap = { margin, minX, minZ, scale, path2d };
        }

        // ミニマップの更新関数
        function updateMinimap() {
            const canvas = document.getElementById('minimap');
            const ctx = canvas.getContext('2d');
            if (!renderCache.minimap) _buildMinimapCache();
            const { margin, minX, minZ, scale, path2d } = renderCache.minimap;

            // キャンバスをクリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景色
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パスを描画（キャッシュ済みPath2D）
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1;
            ctx.stroke(path2d);

            // 車の位置をミニマップ上で表示
            for (let i = 0; i < cars.length; i++) {
                const car = cars[i];
                const point = carPath.getPointAt(car.position);
                const x = margin + (point.x - minX) * scale;
                const y = margin + (point.z - minZ) * scale;

                // 車の向きを計算
                const tangent = carPath.getTangentAt(car.position).normalize();
                const angle = Math.atan2(tangent.z, tangent.x) + Math.PI/2;

                // 車を三角形で描画
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, -5);  // 先端
                ctx.lineTo(-3, 3);  // 左下
                ctx.lineTo(3, 3);   // 右下
                ctx.closePath();
                let carColor = 'white';
                if (i === currentCarIndex) carColor = 'red';
                else if (car.isTandemFollowing) carColor = '#00ffff'; // TANDEM: シアン
                else if (car.isOvertaking) carColor = '#ff8800'; // PASS: オレンジ
                ctx.fillStyle = carColor;
                ctx.fill();
                ctx.restore();
            }
        }

        // 車の自動切り替え用の変数を初期化
        let lastCarChangeTime = Date.now();
        let carChangeInterval = 20000 + Math.random() * 10000; // 20-30秒のランダムな間隔

        // BGMの初期化と制御
        async function initBgm() {
            // BGM関連の変数
            let isBgmMuted = true; // 初期状態をミュートに変更
            let bgmVolume = 0.2;

            const bgms = ['RRR-01.mid', 'RR-01.mid', 'RR4-01.mid', 'RR4-02.mid'];
            const picoAudio = new PicoAudio();
            picoAudio.init();
            picoAudio.setMasterVolume(0.2); // 初期音量を0に設定

            async function playRandomBgm() {
                const randomIndex = Math.floor(Math.random() * bgms.length);
                const midiName = `midi/${bgms[randomIndex]}`;
                console.log('fetching', midiName);
                fetch(midiName)
                .then(response => response.arrayBuffer())
                .then(data => {
                    console.log('fetched', midiName);
                    const smfData = picoAudio.parseSMF(data);
                    console.log('parsed', smfData);
                    picoAudio.setData(smfData);
                    picoAudio.play();
                });
            }

            try {
                // ミュートボタンの初期表示を設定
                document.getElementById('muteBgm').textContent = '🔇';

                // 音量スライダーのイベントリスナー
                document.getElementById('bgmVolume').addEventListener('input', function() {
                    bgmVolume = this.value / 100;
                    if (!isBgmMuted) {
                        picoAudio.setMasterVolume(bgmVolume);
                    }
                });

                // ミュートボタンのイベントリスナー
                document.getElementById('muteBgm').addEventListener('click', function() {
                    isBgmMuted = !isBgmMuted;
                    if (isBgmMuted) {
                        picoAudio.setMasterVolume(0);
                        this.textContent = '🔇';
                        picoAudio.stop();
                    } else {
                        picoAudio.setMasterVolume(bgmVolume);
                        this.textContent = '🔊';
                        playRandomBgm();
                    }
                });

                // 再生終了時のループ処理
                picoAudio.addEventListener('songEnd', () => {
                    playRandomBgm();
                });
            } catch (error) {
                console.error('BGMの初期化エラー:', error);
            }
        }
